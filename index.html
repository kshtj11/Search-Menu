<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mecha Comet — Search Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* greyscale by elevation — higher z-index = lighter */
    --bg:#000000;       /* z0 device surface */
    --l1:#141414;       /* z1 cards: tiles, chips, bar, fn keys */
    --l2:#1e1e1e;       /* z2 sub-elements: icons, option buttons */
    --l3:#2a2a2a;       /* z3 most-raised: key tops */
    --sel:#1c1c1c;      /* selected fill */
    --sel-ring:#4a4a4a; /* selection indicator (spaced 2px out) */
    --txt:#e9e9e9;
    --txt-dim:#8a8a8a;
    --txt-faint:#5a5a5a;
    --accent:#7aa2ff;
    --r:4px;            /* global corner radius */
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:none;-ms-overflow-style:none;}
  *::-webkit-scrollbar{display:none;width:0;height:0;}   /* hide every scrollbar */
  html,body{height:100%;overflow:hidden;}                /* no page scroll/bars */
  body{
    background:#0a0a0a;
    font-family:'Sora',system-ui,sans-serif;
    color:var(--txt);
  }

  /* ---------- device frame (square, no stroke) ----------
     the single device div: holds the home screen AND the search surface,
     dead-centered in the page both axes regardless of viewport size */
  .phone{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:540px;
    height:620px;
    background:var(--bg);
    box-shadow:0 24px 60px rgba(0,0,0,.6);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ---------- top bar (toggle) ---------- */
  .topbar{
    height:40px;
    flex:0 0 40px;
    display:flex;
    align-items:center;
    padding:0 14px;
    gap:10px;
  }
  /* toggles — 25% smaller than baseline */
  .toggle{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--l1);
    border-radius:var(--r);
    padding:4px 8px 4px 5px;
    cursor:pointer;
    user-select:none;
  }
  .toggle .knob{
    width:22px;height:14px;border-radius:var(--r);background:var(--l2);
    position:relative;transition:background .18s;flex:0 0 auto;
  }
  .toggle .knob::after{
    content:'';position:absolute;top:1.5px;left:1.5px;width:11px;height:11px;
    border-radius:50%;background:#6e6e6e;transition:transform .18s,background .18s;
  }
  .toggle.on .knob{background:#2a3550;}
  .toggle.on .knob::after{transform:translateX(8px);background:var(--accent);}
  .toggle .lbl{font-size:8px;color:var(--txt-dim);letter-spacing:.2px;}

  /* ---------- content stack ---------- */
  .stack{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}

  /* results region grows; scrolls if needed */
  /* 30px side gutter: app tiles, card icons & query text all line up here */
  .results{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;   /* momentum swipe on touch */
    touch-action:pan-y;
    overscroll-behavior:contain;
    cursor:grab;
    padding:8px 30px 4px;
    display:flex;
    flex-direction:column;
    gap:10px;
    /* fade clipped content at the bottom edge so it doesn't leave a stray sliver "bar" above the chips/bar */
    -webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 16px),transparent 100%);
    mask-image:linear-gradient(to bottom,#000 calc(100% - 16px),transparent 100%);
  }
  .results::-webkit-scrollbar{width:0;}

  /* pinned (empty state) — 64px tiles, left-aligned to the 30px gutter,
     same tile size + start + gap as the search app row so they read as one grid */
  .pinned-wrap{padding:18px 30px 4px;flex:1 1 auto;}
  .pinned-label{font-size:10px;letter-spacing:2px;color:var(--txt-faint);margin-bottom:12px;}
  .pinned-row{display:flex;gap:52px;}
  .pin{
    flex:0 0 64px;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  }
  .pin .tile{
    width:64px;height:64px;border-radius:var(--r);background:var(--l1);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;color:var(--txt-dim);text-transform:lowercase;transition:transform .12s,box-shadow .12s;
  }
  /* selection sits 2px outside the tile (2px invisible gap, then ring) */
  .pin.sel .tile{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--sel-ring);}
  .pin:active .tile{transform:scale(.94);}
  .pin .plabel{font-size:16px;color:#ffffff;white-space:nowrap;}

  /* result row — icon sits on the 30px gutter (no extra left padding) */
  .row{
    display:flex;align-items:center;gap:12px;padding:9px 0;border-radius:var(--r);
    cursor:pointer;background:transparent;
  }
  /* selection: 2px invisible gap from the row, then a ring rises outside it */
  .row.sel{background:var(--sel);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--sel-ring);}

  /* list section title (e.g. Recent searches) */
  .list-title{font-size:11px;letter-spacing:1.5px;color:var(--txt-faint);
    text-transform:uppercase;padding:2px 0 8px;}

  /* grouped list — hairline separators so rows read as one group */
  .cardgroup{display:flex;flex-direction:column;}
  .cardgroup .row{border-bottom:1px solid var(--l2);border-radius:0;padding:11px 0;}
  .cardgroup .row:last-child{border-bottom:none;}
  .cardgroup .row.sel{border-bottom-color:transparent;}
  .row .ricon{
    width:34px;height:34px;flex:0 0 34px;border-radius:var(--r);background:var(--l2);
    display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txt-dim);
    text-transform:lowercase;
  }
  .row .rbody{display:flex;flex-direction:column;min-width:0;gap:2px;flex:1;}
  .row .rtitle{font-size:15px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .rsub{font-size:12px;color:var(--txt-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* dual-option (web / files) trailing buttons */
  .row .ractions{display:flex;gap:6px;flex:0 0 auto;}
  .ractions .opt{
    display:flex;align-items:center;gap:5px;background:var(--l2);
    border-radius:var(--r);padding:5px 9px;cursor:pointer;
  }
  .ractions .opt:active{background:var(--l3);}
  .ractions .opt .oicon{font-size:8px;text-transform:lowercase;}
  .ractions .opt .olabel{font-size:11px;color:var(--txt-dim);}
  .ractions .opt.primary{background:var(--l3);}

  /* answer row (math/peek) — grey frame, accent text only */
  .row.answer{background:var(--l2);}
  .row.answer .ricon{background:var(--l3);color:#bcd0ff;}
  .row.answer .rtitle{font-size:18px;font-weight:500;color:#dfe8ff;}
  .answer-div{height:1px;background:var(--l2);margin:2px 0;}

  /* tile row (app matches + search routes) — horizontally swipeable, aligned to gutter.
     4px padding + -4px margin gives the selection ring room without breaking alignment. */
  /* search app row — 64px tiles, gap 52, starts at the 30px gutter (via results
     padding), scrolls horizontally showing ~4.25 tiles as a "more" cue */
  .tilerow{
    display:flex;flex-wrap:nowrap;align-items:flex-start;gap:52px;
    flex:0 0 auto;height:100px;            /* definite height: scroll container needs it */
    padding:4px 0;
    overflow-x:auto;overflow-y:hidden;
    touch-action:pan-x;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;
  }
  .gtile{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;width:64px;flex:0 0 64px;}
  .gtile .gbox{
    width:64px;height:64px;flex:0 0 64px;border-radius:var(--r);background:var(--l1);
    display:flex;align-items:center;justify-content:center;font-size:9px;text-transform:lowercase;
    transition:transform .12s,box-shadow .12s;
  }
  .gtile.sel .gbox{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--sel-ring);}
  .gtile:active .gbox{transform:scale(.94);}
  .gtile .glabel{font-size:14px;color:#ffffff;white-space:nowrap;}
  /* grayed TUI code shown under the app name */
  .gcode,.pin .gcode{font-size:11px;color:var(--txt-faint);font-family:'JetBrains Mono',monospace;margin-top:1px;}

  /* general-search block: query text + route tiles — aligned to gutter */
  .searchblock{padding:8px 0 4px;}
  .searchblock .searchquery{font-size:18px;color:#ffffff;margin-bottom:14px;padding:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .searchblock .tilerow{overflow-x:visible;}

  /* ---------- chips ---------- */
  .chips{
    display:flex;gap:8px;padding:6px 14px 8px;flex:0 0 auto;min-height:0;
  }
  .chips.hidden{display:none;}
  .chip{
    background:var(--l1);border-radius:var(--r);
    padding:6px 12px;font-size:12px;color:var(--txt-dim);cursor:pointer;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;
  }
  .chip:active{background:var(--l2);}

  /* ---------- search bar (always bottom-stuck; on top of kb when shown) ---------- */
  .bar{
    flex:0 0 auto;margin:0 14px 12px;display:flex;align-items:center;gap:12px;
    background:var(--l1);border-radius:var(--r);
    padding:13px 18px;min-height:52px;
  }
  .bar .sicon{
    font-size:11px;color:var(--txt-dim);flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;min-width:18px;
  }
  .bar .sicon.app{
    width:22px;height:22px;border-radius:var(--r);font-size:8px;text-transform:lowercase;
    color:#fff;
  }
  .bar .field{flex:1;font-size:16px;display:flex;align-items:center;white-space:pre;overflow:hidden;}
  .bar .barclose{
    flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--l2);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt-dim);
    cursor:pointer;user-select:none;
  }
  .bar .barclose:active{background:var(--l3);}
  .bar .ph{color:var(--txt-faint);}
  .tok{transition:color .1s;}
  .ghost{color:var(--txt-faint);opacity:.6;}
  .caret{
    width:2px;height:20px;background:#ffffff;display:inline-block;margin:0 1px;
    animation:blink 1.05s steps(1) infinite;vertical-align:middle;
  }
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}

  /* ---------- on-screen keyboard (kbd-alpha) ---------- */
  .keyboard{
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:6px 0px 10px;position:relative;width:540px;height:240px;flex:0 0 240px;background:#000000;
  }
  .keyboard.hidden{display:none;}
  .krow{
    display:flex;flex-direction:row;justify-content:center;align-items:center;
    width:540px;height:56px;
  }
  .ktouch{position:relative;height:56px;flex:none;box-sizing:border-box;}
  .kkey{
    position:absolute;left:4px;top:4px;height:48px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;font-family:'JetBrains Mono',monospace;font-weight:400;font-size:28px;
    color:#DDDDDD;cursor:pointer;user-select:none;line-height:1;
  }
  .kkey:active{filter:brightness(1.35);}
  .kkey svg{display:block;}
  /* spacebar trackpad/cursor mode: hide glyphs, darken other keys, brighten space */
  .keyboard.cursor .kkey{color:transparent;background:#161616 !important;}
  .keyboard.cursor .kkey svg{opacity:0;}
  .keyboard.cursor .spacekey{background:#6a6a6a !important;}

  /* ---------- launched app screen ---------- */
  .appscreen{
    position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:30;
  }
  .appscreen.show{display:flex;}
  .appscreen .ahead{
    height:46px;flex:0 0 46px;display:flex;align-items:center;gap:10px;padding:0 16px;
    background:var(--l1);
  }
  .appscreen .aback{font-size:13px;color:var(--txt-dim);cursor:pointer;}
  .appscreen .atitle{font-size:14px;color:var(--txt);}
  .appscreen .abody{flex:1;padding:18px;overflow:auto;}
  .term{font-family:'Sora',monospace;font-size:13px;color:#cfcfcf;line-height:1.7;}
  .term .pmpt{color:#ff9d4d;}
  .term .out{color:var(--txt-dim);}

  /* ---------- toast ---------- */
  .toast{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
    background:var(--l3);color:#eee;font-size:13px;padding:9px 16px;
    border-radius:var(--r);opacity:0;transition:opacity .2s,transform .2s;z-index:40;pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- home / dock / search-surface layers ---------- */
  #homeLayer{
    position:absolute;inset:0;z-index:1;
    background:#5b6cc4 url('home.png') center/cover no-repeat;
    touch-action:none;cursor:grab;
  }
  #dockLayer{
    position:absolute;left:0;right:0;bottom:0;height:86px;z-index:2;
    background:#000 url('Dock.png') center/contain no-repeat;
    transform:translateY(100%);
  }
  #searchSurface{
    position:absolute;inset:0;z-index:3;
    display:flex;flex-direction:column;background:var(--bg);
    transform:translateY(100%);
  }
  /* smooth snap when not actively dragging */
  #phone:not(.dragging) #dockLayer,
  #phone:not(.dragging) #searchSurface{transition:transform .28s cubic-bezier(.22,.61,.36,1);}

</style>
</head>
<body>
    <div class="phone" id="phone">
      <!-- base home screen -->
      <div id="homeLayer"></div>
      <!-- navigation dock (revealed on swipe up) -->
      <div id="dockLayer"></div>

      <!-- the search surface — slides up from the bottom over home -->
      <div id="searchSurface">
      <div class="topbar" id="topbar">
        <div class="toggle" id="kbToggle" title="Toggle on-screen / connected keyboard">
          <span class="knob"></span>
          <span class="lbl" id="kbToggleLbl">On-screen KB</span>
        </div>
        <div class="toggle" id="chipsToggle" title="Toggle suggestion chips">
          <span class="knob"></span>
          <span class="lbl">Chips</span>
        </div>
      </div>

      <div class="stack">
        <!-- empty-state pinned -->
        <div class="pinned-wrap" id="pinnedWrap">
          <div class="pinned-row" id="pinnedRow"></div>
        </div>

        <!-- typing-state results -->
        <div class="results" id="results" style="display:none;"></div>

        <!-- chips -->
        <div class="chips hidden" id="chips"></div>

        <!-- search bar -->
        <div class="bar" id="bar">
          <span class="sicon" id="sicon">⌕</span>
          <div class="field" id="field"></div>
          <div class="barclose" id="barClose" title="Clear / close">✕</div>
        </div>
      </div>

      <!-- on-screen keyboard -->
      <div class="keyboard" id="keyboard"></div>

      <!-- launched app screen overlay -->
      <div class="appscreen" id="appscreen">
        <div class="ahead">
          <span class="aback" id="aback">‹ back</span>
          <span class="atitle" id="atitle"></span>
        </div>
        <div class="abody" id="abody"></div>
      </div>

      <div class="toast" id="toast"></div>
      </div><!-- /searchSurface -->
    </div><!-- /phone (device) -->

<script>
/* =====================================================================
   CONFIG  (data, not hardcoded branches)
   ===================================================================== */
const ACCENTS = {
  terminal:'#ff9d4d', files:'#5ec8a0', settings:'#7aa2ff',
  modules:'#c08cff', audio:'#ff6f9c', camera:'#ffd24d', calc:'#9bd0ff',
};

// app-icon images by app id (folder name has a space → URL-encode it).
// apps not listed here fall back to the 3-letter text tile.
const ICONS = {
  camera:'app%20icons/camera.png',
  terminal:'app%20icons/Terminal.png',
  files:'app%20icons/Files.png',
  settings:'app%20icons/Settings.png',
  audio:'app%20icons/music.png',
  notes:'app%20icons/notes.png',
};

// §6 system codes
const CODES = {
  ter:{ app:'Terminal', appId:'terminal', accent:ACCENTS.terminal,
        args:['cd','ls','pwd','cd ~/downloads'] },
  fil:{ app:'Files',    appId:'files',    accent:ACCENTS.files,
        args:['~/downloads','~/dl/*.png','recent','~/photos'] },
  set:{ app:'Settings', appId:'settings', accent:ACCENTS.settings,
        args:['wifi off','bright 40','bluetooth','airplane on'] },
  mod:{ app:'Modules',  appId:'modules',  accent:ACCENTS.modules,
        args:['gamepad','keyboard','lidar','thermal'] },
  mus:{ app:'Music',    appId:'audio',    accent:ACCENTS.audio,
        args:['vol 60','mute','output','balance'] },
};

// reverse map: app id → its TUI code (for the grayed code shown under tiles)
const CODE_BY_APP = Object.fromEntries(Object.entries(CODES).map(([c,v])=>[v.appId,c]));

// searchable app registry (fuzzy-matched, launcher mode)
const APPS = [
  { id:'camera',   label:'Camera',   accent:ACCENTS.camera,   sub:'photo · video' },
  { id:'terminal', label:'Terminal', accent:ACCENTS.terminal, sub:'shell · code ter' },
  { id:'files',    label:'Files',    accent:ACCENTS.files,    sub:'explorer · code fil' },
  { id:'settings', label:'Settings', accent:ACCENTS.settings, sub:'system · code set' },
  { id:'calc',     label:'Calculator',accent:ACCENTS.calc,    sub:'math' },
  { id:'modules',  label:'Modules',  accent:ACCENTS.modules,  sub:'hot-swap · code mod' },
  { id:'audio',    label:'Music',    accent:ACCENTS.audio,    sub:'sound · code mus' },
  { id:'maps',     label:'Maps',     accent:'#86d07a',        sub:'navigation' },
  { id:'camera2',  label:'Camera Roll',accent:ACCENTS.camera, sub:'gallery' },
  { id:'notes',    label:'Notes',    accent:'#dfe4ea',        sub:'jot · markdown' },
];

// in-app actions / widgets (§4.4)  "App › sub-feature"
const ACTIONS = [
  { id:'set-wifi', app:'Settings', appId:'settings', accent:ACCENTS.settings, label:'Settings › wifi',      icon:'set' },
  { id:'set-bri',  app:'Settings', appId:'settings', accent:ACCENTS.settings, label:'Settings › brightness',icon:'set' },
  { id:'cam-vid',  app:'Camera',   appId:'camera',   accent:ACCENTS.camera,   label:'Camera › video',       icon:'cam' },
  { id:'snd-vol',  app:'Music',    appId:'audio',    accent:ACCENTS.audio,    label:'Music › volume',       icon:'mus' },
];

// §Config — pinned apps (4); #1 is implicit Enter target on empty
const PINNED = [
  { id:'camera',   label:'Camera',   accent:ACCENTS.camera },
  { id:'terminal', label:'Terminal', accent:ACCENTS.terminal },
  { id:'files',    label:'Files',    accent:ACCENTS.files },
  { id:'settings', label:'Settings', accent:ACCENTS.settings },
];

/* =====================================================================
   STATE
   ===================================================================== */
const state = {
  query:'',
  cursorPos:0,           // caret index within query (for spacebar-cursor editing)
  selectedIndex:0,
  results:[],
  chips:[],
  tokenCode:null,        // active recognized code object (for bar/icon styling)
  ghost:'',              // tab-completion ghost text
  pinnedSel:0,
  onScreenKB:true,
  showAllApps:false,     // app-tile row: top 4 + "more", or all
  showChips:false,       // suggestion chips off by default (top-bar toggle)
  showRecent:false,      // recent-search recall panel (↑ on empty bar)
  recent:[               // history store, most-recent first (seeded for demo)
    'ter cd ~/downloads','wifi','2 + 5','camera','snd vol 60',
    'brightness 40','files ~/photos','terminal','set bluetooth','maps',
  ],
};

/* =====================================================================
   PARSE  (§8)  input string -> { mode, code?, query, args[] }
   ===================================================================== */
function parseInput(str){
  const raw = str;
  const trimmed = str.trim();
  if(trimmed === '') return { mode:'empty', query:'' };

  // 1. inline operators
  if(trimmed.startsWith('?'))
    return { mode:'peek', query:trimmed.slice(1).trim(), raw };

  const mathOnly = /^[\d\s+\-*/().%]+$/.test(trimmed.replace(/^=/, ''));
  const hasOp = /[+\-*/]/.test(trimmed.replace(/^=/, ''));
  if((trimmed.startsWith('=') || hasOp) && mathOnly)
    return { mode:'math', expr:trimmed.replace(/^=/, '').trim(), query:trimmed, raw };

  // 2. exact code match  (leading word)
  const firstWord = trimmed.split(/\s+/)[0].toLowerCase();
  if(CODES[firstWord]){
    const rest = trimmed.slice(firstWord.length).trimStart();
    return { mode:'code', code:firstWord, query:rest,
             args:rest.length?rest.split(/\s+/):[], raw };
  }

  // 3+ plain query (launcher / action / file / web)
  return { mode:'plain', query:trimmed, raw };
}

/* =====================================================================
   RESOLVE  (§4 hierarchy) -> ranked Result[]
   Result = { type, icon, accent, title, sub?, action() }
   ===================================================================== */
function fuzzy(needle, hay){
  needle = needle.toLowerCase(); hay = hay.toLowerCase();
  if(hay.startsWith(needle)) return 3;
  if(hay.includes(needle)) return 2;
  let i=0; for(const c of hay){ if(c===needle[i]) i++; }
  return i===needle.length ? 1 : 0;
}

function resolve(p){
  const out = [];

  if(p.mode==='math'){
    let val;
    try{ val = Function('"use strict";return ('+p.expr+')')(); }catch(e){ val=null; }
    if(val!==null && val!==undefined && !Number.isNaN(val)){
      out.push({ type:'answer', icon:'=', accent:ACCENTS.calc, title:'= '+val,
                 sub:null, action:()=>{ copy(String(val)); toast('Copied '+val); } });
    }
    // §4: regular results STILL appear below — Calculator app tile + search routes
    out.push(appResult(APPS.find(a=>a.id==='calc')));
    routeResults(p.query).forEach(r=>out.push(r));
    return out;
  }

  if(p.mode==='peek'){
    const stub = { bat:'72% · 3h 41m left', net:'Wi-Fi · MechaNet · -48dBm',
                   ram:'4.1 / 8 GB', cpu:'12% · 41°C' };
    const key = (p.query||'').toLowerCase();
    const val = stub[key] || 'no reading';
    out.push({ type:'answer', icon:'?', accent:'#9bd0ff', title:val,
               sub:'?'+key+' · live peek', action:()=>toast('Peek: '+key) });
    return out;
  }

  if(p.mode==='code'){
    const c = CODES[p.code];
    // scoped command mode — primary row = run-in-app
    out.push({
      type:'code', icon:p.code, iconImg:ICONS[c.appId], accent:c.accent,
      title:c.app+(p.query?' · '+p.query:' (scoped)'),
      sub:p.query? 'run: '+p.code+' '+p.query : 'type args, Enter to run',
      action:()=>runCode(p.code, p.query),
    });
    // show the underlying app too
    out.push(appResult(APPS.find(a=>a.id===c.appId)));
    return out;
  }

  // ---- plain: app matches (tiles) -> actions (cards) -> search routes (tiles)
  const q = p.query;

  const ranked = APPS.map(a=>({a, s:fuzzy(q, a.label)}))
                     .filter(x=>x.s>0).sort((x,y)=>y.s-x.s);
  ranked.forEach(x=>out.push(appResult(x.a)));

  ACTIONS.filter(ac=>fuzzy(q, ac.label)>0)
         .forEach(ac=>out.push({ type:'action', icon:ac.icon, iconImg:ICONS[ac.appId], accent:ac.accent,
            title:ac.label, action:()=>toast('Open '+ac.label) }));

  // general-search routes — Search (web) + Files, rendered as side-by-side tiles
  routeResults(q).forEach(r=>out.push(r));

  return out;
}

function appResult(a){
  if(!a) return null;
  return { type:'app', icon:a.id.slice(0,3), iconImg:ICONS[a.id], accent:a.accent, title:a.label,
           code:CODE_BY_APP[a.id], action:()=>launchApp(a.id, a.label) };
}

// the two general-search destinations, as tiles (like pinned apps)
function routeResults(q){
  return [
    { type:'web',        icon:'⌕',   accent:'#cfd6e6', title:'Search',
      action:()=>toast('Searching web: '+q) },
    { type:'filesroute', icon:'fil', iconImg:ICONS.files, accent:ACCENTS.files, title:'Files',
      action:()=>openFiles(q) },
  ];
}

/* =====================================================================
   CHIPS  (§5) — 3 live suggestions
   ===================================================================== */
function buildChips(p){
  if(p.mode==='code'){
    const c = CODES[p.code];
    return c.args.slice(0,3).map(arg=>({ label:arg,
      apply:()=>setQuery(p.code+' '+arg) }));
  }
  if(p.mode==='math'){
    return [{label:'copy answer',apply:()=>{const r=state.results[0];r&&r.action();}},
            {label:'open Calculator',apply:()=>launchApp('calc','Calculator')},
            {label:'clear',apply:()=>setQuery('')}];
  }
  if(p.mode==='plain' && p.query){
    const top = APPS.map(a=>({a,s:fuzzy(p.query,a.label)})).filter(x=>x.s>0)
                    .sort((x,y)=>y.s-x.s).slice(0,3);
    const chips = top.map(x=>({label:x.a.label, apply:()=>setQuery(x.a.label)}));
    const fallbacks=[
      {label:'web: '+p.query, apply:()=>toast('Searching web: '+p.query)},
      {label:'files: '+p.query, apply:()=>openFiles(p.query)},
    ];
    let fi=0; while(chips.length<3) chips.push(fallbacks[fi++%fallbacks.length]);
    return chips.slice(0,3);
  }
  return [];
}

/* =====================================================================
   GHOST / TOKEN  (§3) — code autocompletion
   ===================================================================== */
function computeGhost(p, raw){
  if(p.mode!=='plain' || !raw) return '';
  // 1) code-token completion (single leading word: te -> ter)
  const word = raw.trim().split(/\s+/)[0].toLowerCase();
  if(raw.trim()===word){
    const match = Object.keys(CODES).find(c=>c.startsWith(word) && c!==word);
    if(match) return match.slice(word.length);
  }
  // 2) terminal-style history autosuggest from recent searches
  const hist = state.recent.find(h=>
    h.toLowerCase().startsWith(raw.toLowerCase()) && h.length>raw.length);
  if(hist) return hist.slice(raw.length);
  return '';
}

/* =====================================================================
   PIPELINE  — single render entry
   ===================================================================== */
function update(){
  const raw = state.query;
  const p = parseInput(raw);

  state.tokenCode = (p.mode==='code') ? CODES[p.code] : null;
  state.results = resolve(p).filter(Boolean);
  state.chips = buildChips(p);
  state.ghost = computeGhost(p, raw);

  const selCount = state.showRecent ? state.recent.length : state.results.length;
  if(state.selectedIndex >= selCount) state.selectedIndex = 0;
  if(state.selectedIndex < 0) state.selectedIndex = 0;

  renderBar(p, raw);
  renderBody(p);
  renderChips();
  renderSearchIcon(p);

  // ✕ clears text when present, becomes a ⌄ dismiss affordance when empty
  const bc=document.getElementById('barClose'); if(bc) bc.textContent = raw ? '✕' : '⌄';

  // when the typed text changes, jump the list back to the top (recall self-scrolls)
  if(!state.showRecent && state._lastQ!==raw){
    const r=document.getElementById('results'); if(r) r.scrollTop=0;
  }
  state._lastQ=raw;
}

function setQuery(v){
  state.query = v;
  state.cursorPos = v.length;
  state.selectedIndex = 0;
  state.showAllApps = false;
  state.showRecent = false;
  update();
}
function moveCursor(d){
  state.cursorPos = Math.max(0, Math.min(state.query.length, state.cursorPos + d));
  update();
}
// shared up/down behaviour (used by hardware keys AND spacebar-swipe)
function arrowUp(){ if(state.query==='' && !state.showRecent) openRecent(); else moveSelection(-1); }
function arrowDown(){ moveSelection(1); }

/* =====================================================================
   RENDER — bar token state (§3)
   ===================================================================== */
function renderBar(p, raw){
  const field = document.getElementById('field');
  field.innerHTML='';

  if(raw===''){
    field.appendChild(caret());              // white cursor sits before the "S"
    const ph=document.createElement('span'); ph.className='ph';
    ph.textContent='Search'; field.appendChild(ph);
    return;
  }

  if(p.mode==='code'){
    const lead = raw.match(/^(\s*)(\S+)(.*)$/s);
    // styled code token
    const tok=document.createElement('span'); tok.className='tok';
    tok.style.color = state.tokenCode.accent; tok.style.opacity='.7';
    tok.textContent = lead[1]+lead[2];
    field.appendChild(tok);
    const rest=document.createElement('span'); rest.textContent=lead[3];
    field.appendChild(rest);
    field.appendChild(caret());
    return;
  }

  // plain text + caret at cursorPos + optional ghost (only when caret at end)
  const cp=Math.max(0,Math.min(raw.length,state.cursorPos));
  const before=document.createElement('span'); before.textContent=raw.slice(0,cp);
  field.appendChild(before);
  field.appendChild(caret());
  const after=document.createElement('span'); after.textContent=raw.slice(cp);
  field.appendChild(after);
  if(state.ghost && cp===raw.length){
    const g=document.createElement('span'); g.className='ghost'; g.textContent=state.ghost;
    field.appendChild(g);
  }
}
function caret(){ const c=document.createElement('span'); c.className='caret'; return c; }

function renderSearchIcon(p){
  const ic=document.getElementById('sicon');
  if(p.mode==='code'){                 // only show the icon once an app/code is scoped
    ic.style.display='flex';
    ic.className='sicon app';
    const img=ICONS[state.tokenCode.appId];
    if(img){ ic.style.background='transparent'; setIcon(ic, img, p.code, '#fff'); }
    else { ic.style.background=state.tokenCode.accent; ic.textContent=p.code; }
  }else{
    ic.style.display='none';           // blank / plain search: no leading icon
    ic.innerHTML='';
  }
}

/* =====================================================================
   RENDER — body (pinned empty-state OR ranked results)
   ===================================================================== */
function renderBody(p){
  const pinned=document.getElementById('pinnedWrap');
  const results=document.getElementById('results');

  // ↑ recall takes over the surface even though the bar now holds the selected text
  if(state.showRecent){
    pinned.style.display='none';
    results.style.display='flex';
    renderRecent(results);
    return;
  }

  if(p.mode==='empty'){
    pinned.style.display='block';
    results.style.display='none';
    renderPinned();
    return;
  }

  pinned.style.display='none';
  results.style.display='flex';
  results.innerHTML='';

  // code mode keeps the simple TUI card list (icon + name + arg subtext)
  if(p.mode==='code'){
    const grp=document.createElement('div'); grp.className='cardgroup';
    state.results.forEach((r,i)=>grp.appendChild(mkRow(r,i,false)));
    results.appendChild(grp);
    return;
  }

  // grouped general search: answers → app tiles → cards → search routes
  const groups={answers:[],apps:[],cards:[],routes:[]};
  state.results.forEach((r,i)=>{
    if(r.type==='answer') groups.answers.push([r,i]);
    else if(r.type==='app') groups.apps.push([r,i]);
    else if(r.type==='web'||r.type==='filesroute') groups.routes.push([r,i]);
    else groups.cards.push([r,i]);
  });

  groups.answers.forEach(([r,i])=>results.appendChild(mkCard(r,i,true)));
  if(groups.answers.length && (groups.apps.length||groups.cards.length||groups.routes.length)){
    const d=document.createElement('div'); d.className='answer-div'; results.appendChild(d);
  }

  // app matches → horizontally-swipeable row of tiles (swipe to discover more)
  if(groups.apps.length){
    const row=document.createElement('div'); row.className='tilerow';
    groups.apps.forEach(([r,i])=>row.appendChild(mkTile(r,i)));
    results.appendChild(row);
  }

  // other results → grouped cards (icon + name) with hairline separators
  if(groups.cards.length){
    const grp=document.createElement('div'); grp.className='cardgroup';
    groups.cards.forEach(([r,i])=>grp.appendChild(mkCard(r,i,false)));
    results.appendChild(grp);
  }

  // general-search routes → query text + Search/Files tiles, tap to enter
  if(groups.routes.length){
    const block=document.createElement('div'); block.className='searchblock';
    const q=document.createElement('div'); q.className='searchquery'; q.textContent='"'+(p.query||'')+'"';
    block.appendChild(q);
    const row=document.createElement('div'); row.className='tilerow';
    groups.routes.forEach(([r,i])=>row.appendChild(mkTile(r,i)));
    block.appendChild(row);
    results.appendChild(block);
  }
}

// fill an icon box with the app-icon image, or fall back to text
function setIcon(box, imgPath, text, accent){
  box.innerHTML=''; box.style.color=accent||'var(--txt-dim)';
  if(imgPath){
    box.style.overflow='hidden'; box.style.background='transparent';
    const img=document.createElement('img'); img.src=imgPath; img.alt='';
    img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;';
    box.appendChild(img);
  } else { box.textContent=text; }
}

// simple list card — icon + name only (no subtext)
function mkCard(r,i,isAnswer){
  const row=document.createElement('div');
  row.className='row'+(isAnswer?' answer':'')+(i===state.selectedIndex?' sel':'');
  row.onclick=()=>{ state.selectedIndex=i; update(); r.action&&r.action(); };
  const ic=document.createElement('div'); ic.className='ricon';
  setIcon(ic, r.iconImg, r.icon, r.accent);
  row.appendChild(ic);
  const body=document.createElement('div'); body.className='rbody';
  const t=document.createElement('div'); t.className='rtitle'; t.textContent=r.title;
  body.appendChild(t); row.appendChild(body);
  return row;
}

// tile — icon box + name (app match or search route), like pinned apps
function mkTile(r,i){
  const el=document.createElement('div');
  el.className='gtile'+(i===state.selectedIndex?' sel':'');
  el.onclick=()=>{ state.selectedIndex=i; update(); r.action&&r.action(); };
  const box=document.createElement('div'); box.className='gbox';
  setIcon(box, r.iconImg, r.icon, r.accent||'#fff');
  const lab=document.createElement('div'); lab.className='glabel'; lab.textContent=r.title;
  el.appendChild(box); el.appendChild(lab);
  if(r.code){ const c=document.createElement('div'); c.className='gcode'; c.textContent=r.code; el.appendChild(c); }
  return el;
}

function mkRow(r,i,isAnswer){
  const row=document.createElement('div');
  row.className='row'+(isAnswer?' answer':'')+(i===state.selectedIndex?' sel':'');
  row.onclick=()=>{ state.selectedIndex=i; update(); r.action&&r.action(); };

  const ic=document.createElement('div'); ic.className='ricon';
  setIcon(ic, r.iconImg, r.icon, r.accent);
  row.appendChild(ic);

  const body=document.createElement('div'); body.className='rbody';
  const t=document.createElement('div'); t.className='rtitle'; t.textContent=r.title;
  body.appendChild(t);
  if(r.sub){ const s=document.createElement('div'); s.className='rsub'; s.textContent=r.sub; body.appendChild(s); }
  row.appendChild(body);

  // dual-option trailing buttons (web / files)
  if(r.options){
    const acts=document.createElement('div'); acts.className='ractions';
    r.options.forEach((o,oi)=>{
      const btn=document.createElement('div');
      btn.className='opt'+(oi===0?' primary':'');
      const dot=document.createElement('span');
      dot.style.cssText='width:6px;height:6px;border-radius:50%;flex:0 0 6px;background:'+o.accent;
      const ol=document.createElement('span'); ol.className='olabel'; ol.textContent=o.label;
      if(oi===0){ const ek=document.createElement('span'); ek.className='olabel';
        ek.style.color='var(--txt-faint)'; ek.style.fontSize='9px'; ek.textContent='⏎';
        btn.appendChild(dot); btn.appendChild(ol); btn.appendChild(ek);
      } else { btn.appendChild(dot); btn.appendChild(ol); }
      btn.onclick=(e)=>{ e.stopPropagation(); state.selectedIndex=i; o.action(); };
      acts.appendChild(btn);
    });
    row.appendChild(acts);
  }
  return row;
}

function renderPinned(){
  const row=document.getElementById('pinnedRow');
  row.innerHTML='';
  PINNED.forEach((pn,i)=>{
    const el=document.createElement('div');
    el.className='pin'+(i===state.pinnedSel?' sel':'');
    el.onclick=()=>{ state.pinnedSel=i; launchApp(pn.id, pn.label); };
    const tile=document.createElement('div'); tile.className='tile';
    setIcon(tile, ICONS[pn.id], pn.id.slice(0,3), pn.accent);
    const lab=document.createElement('div'); lab.className='plabel'; lab.textContent=pn.label;
    el.appendChild(tile); el.appendChild(lab);
    const code=CODE_BY_APP[pn.id];
    if(code){ const c=document.createElement('div'); c.className='gcode'; c.textContent=code; el.appendChild(c); }
    row.appendChild(el);
  });
}

// ↑ recall — recent searches, reversed: most recent at the bottom (by the bar),
// older ones above; ↑ walks upward into older. No title, bottom-anchored, scrolls.
function renderRecent(container){
  container.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText='margin-top:auto;padding-bottom:8px;';   // stick to bottom + gap above bar
  const grp=document.createElement('div'); grp.className='cardgroup';
  for(let i=state.recent.length-1;i>=0;i--){     // oldest → top, newest → bottom
    const q=state.recent[i];
    const row=document.createElement('div');
    row.className='row recent'+(i===state.selectedIndex?' sel':'');
    row.onclick=()=>{ state.showRecent=false; setQuery(q); };
    const body=document.createElement('div'); body.className='rbody';
    const t=document.createElement('div'); t.className='rtitle'; t.textContent=q;
    body.appendChild(t); row.appendChild(body);
    grp.appendChild(row);
  }
  wrap.appendChild(grp);
  container.appendChild(wrap);
  // start scrolled to the bottom-most (newest) element
  container.scrollTop=container.scrollHeight;
  requestAnimationFrame(()=>{ container.scrollTop=container.scrollHeight; });
}

function renderChips(){
  const wrap=document.getElementById('chips');
  if(!state.showChips || !state.chips.length){ wrap.className='chips hidden'; return; }
  wrap.className='chips';
  wrap.innerHTML='';
  state.chips.forEach(c=>{
    const el=document.createElement('div'); el.className='chip'; el.textContent=c.label;
    el.onclick=()=>c.apply();
    wrap.appendChild(el);
  });
}

/* =====================================================================
   KEY HANDLING  (§2) — source-agnostic
   ===================================================================== */
function moveSelection(d){
  if(state.showRecent){                  // recall list is reversed: ↑ = older (+1)
    const n=state.recent.length; if(!n) return;
    state.selectedIndex=Math.max(0,Math.min(n-1, state.selectedIndex - d));
    state.query=state.recent[state.selectedIndex];   // type selected entry into the bar
    update(); return;
  }
  if(parseInput(state.query).mode==='empty') return;
  const n=state.results.length; if(!n) return;
  state.selectedIndex=(state.selectedIndex+d+n)%n;
  update();
}

function doEnter(){
  if(state.showRecent){                  // send the recent search now sitting in the bar
    state.showRecent=false; state.selectedIndex=0; update();
  }
  const p=parseInput(state.query);
  if(p.mode==='empty'){                   // launch pinned #1
    const pn=PINNED[state.pinnedSel||0];
    launchApp(pn.id, pn.label); return;
  }
  recordSearch(state.query);              // remember it (terminal-style history)
  const r=state.results[state.selectedIndex];
  r && r.action && r.action();
}

// Tab: accept ghost/autosuggest first; otherwise navigate selection forward
function doTab(shift){
  if(state.showRecent){ moveSelection(shift?-1:1); return; }
  if(state.ghost){                        // complete code OR history autosuggest
    const p=parseInput(state.query);
    const sep = p.mode==='plain' && CODES[(state.query.trim()+state.ghost)] ? ' ' : '';
    setQuery(state.query + state.ghost + sep);
    return;
  }
  const p=parseInput(state.query);
  if(p.mode==='code' && p.args.length===0){
    setQuery(p.code+' '+CODES[p.code].args[0]+' '); return;
  }
  moveSelection(shift?-1:1);              // tab navigation through results
}

function openRecent(){
  if(!state.recent.length){ toast('No recent searches'); return; }
  state.showRecent=true; state.selectedIndex=0;
  state.query=state.recent[0];           // newest entry drops into the bar
  update();
}
function closeRecent(){ if(state.showRecent){ state.showRecent=false; update(); } }

function recordSearch(q){
  q=(q||'').trim(); if(!q) return;
  state.recent=state.recent.filter(x=>x!==q);   // dedupe
  state.recent.unshift(q);
  if(state.recent.length>20) state.recent.pop();
}

function typeChar(ch){
  const q=state.query, cp=Math.max(0,Math.min(q.length,state.cursorPos));
  state.query=q.slice(0,cp)+ch+q.slice(cp); state.cursorPos=cp+1;
  state.selectedIndex=0; state.showAllApps=false; state.showRecent=false; update();
}
function backspace(){
  state.showRecent=false;   // editing the populated text exits recall
  const q=state.query, cp=Math.max(0,Math.min(q.length,state.cursorPos));
  if(cp>0){ state.query=q.slice(0,cp-1)+q.slice(cp); state.cursorPos=cp-1; }
  state.selectedIndex=0; state.showAllApps=false; update();
}

// hardware / external keyboard — same path
document.addEventListener('keydown',e=>{
  if(document.getElementById('appscreen').classList.contains('show')){
    if(e.key==='Escape'||e.key==='Backspace'){ closeApp(); e.preventDefault(); }
    return;
  }
  if(e.key==='Enter'){ doEnter(); e.preventDefault(); }
  else if(e.key==='ArrowDown'){ arrowDown(); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ arrowUp(); e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ moveCursor(-1); e.preventDefault(); }
  else if(e.key==='Tab'){ doTab(e.shiftKey); e.preventDefault(); }
  else if(e.key==='ArrowRight'){
    if(state.ghost && state.cursorPos===state.query.length){ setQuery(state.query+state.ghost); }
    else moveCursor(1);
    e.preventDefault();
  }
  else if(e.key==='Escape'){ closeRecent(); e.preventDefault(); }
  else if(e.key==='Backspace'){ backspace(); e.preventDefault(); }
  else if(e.key.length===1 && !e.metaKey && !e.ctrlKey){ typeChar(e.key); e.preventDefault(); }
});

/* =====================================================================
   ACTIONS / SIDE-EFFECTS (stubbed with toasts + screens)
   ===================================================================== */
function launchApp(id,label){
  if(id==='terminal'){ openTerminal(''); return; }
  toast('Launching '+label);
}

function runCode(code,query){
  const c=CODES[code];
  if(code==='ter'){
    toast('Terminal: ran `'+query+'`');
    setTimeout(()=>openTerminal(query),250);
    return;
  }
  // set/snd/mod mutate inline
  toast(c.app+': '+(query||'(opened)'));
}

function openTerminal(cmd){
  const scr=document.getElementById('appscreen');
  document.getElementById('atitle').textContent='Terminal';
  const body=document.getElementById('abody');
  body.innerHTML='';
  const t=document.createElement('div'); t.className='term';
  let html='<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ </div>';
  if(cmd){
    html='<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ '+escapeHtml(cmd)+'</div>';
    html+=fakeOutput(cmd);
    html+='<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~/downloads</span>$ <span class="caret"></span></div>';
  }else{
    html+='<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ <span class="caret"></span></div>';
  }
  t.innerHTML=html;
  body.appendChild(t);
  scr.classList.add('show');
}
function fakeOutput(cmd){
  if(/^cd\s/.test(cmd)) return '<div class="out">→ '+escapeHtml(cmd.replace(/^cd\s+/,''))+'</div>';
  if(/^ls/.test(cmd)) return '<div class="out">cable.png  setup.sh  notes.md  build/</div>';
  if(/^pwd/.test(cmd)) return '<div class="out">/home/mecha/downloads</div>';
  return '<div class="out">'+escapeHtml(cmd)+': done</div>';
}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function openFiles(query){
  const scr=document.getElementById('appscreen');
  document.getElementById('atitle').textContent='Files';
  const body=document.getElementById('abody');
  const hits=['cable.png','setup.sh','notes.md','build/','holster.stl','readme.txt']
    .filter(f=>!query||f.toLowerCase().includes(query.toLowerCase().slice(0,3)) || true);
  body.innerHTML='<div class="term"><div class="out">~/ matching “'+escapeHtml(query)+'”</div></div>';
  const list=document.createElement('div'); list.className='term';
  hits.forEach(f=>{
    const d=document.createElement('div');
    d.innerHTML='<span style="color:#5ec8a0">▸</span> '+escapeHtml(f);
    list.appendChild(d);
  });
  body.appendChild(list);
  scr.classList.add('show');
}

function closeApp(){ document.getElementById('appscreen').classList.remove('show'); }
document.getElementById('aback').onclick=closeApp;

/* clipboard + toast */
function copy(t){ try{ navigator.clipboard.writeText(t); }catch(e){} }
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600);
}

/* =====================================================================
   ON-SCREEN KEYBOARD  +  toggle
   ===================================================================== */
// kbd-alpha glyph icons (shift / backspace / return) — #DDDDDD vectors
const KEY_ICONS = {
  shift:'<svg width="22" height="19" viewBox="0 0 22 19" fill="none"><path d="M11 1 L20.5 9.5 H15 V18 H7 V9.5 H1.5 Z" fill="#DDDDDD"/></svg>',
  back:'<svg width="23" height="16" viewBox="0 0 23 16" fill="none"><path d="M7.5 1 H22 V15 H7.5 L1 8 Z" stroke="#DDDDDD" stroke-width="1.5" stroke-linejoin="round"/><path d="M11.5 5.5 L17 10.5 M17 5.5 L11.5 10.5" stroke="#DDDDDD" stroke-width="1.5" stroke-linecap="round"/></svg>',
  enter:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#EEEEEE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5 V13 H7"/><path d="M11 9 L7 13 L11 17"/></svg>',
};

// kbd-alpha layout: each key = { label|icon, w(touch), bg, fs?, fw?, onTap }
// key box = (w - 8) wide, 48 tall, inset 4px (per spec); rows are 540×56.
function letterKey(ch){ return { label:ch, w:50, bg:'#3A3A3A', fs:28, onTap:()=>typeChar(ch) }; }

function kbLayout(){
  const L=(s)=>s.split(' ').map(letterKey);
  return [
    L('q w e r t y u i o p'),
    L('a s d f g h j k l'),
    [ { icon:'shift', w:89, bg:'#636363' },
      ...L('z x c v b n m'),
      { icon:'back', w:89, bg:'#474747', onTap:backspace } ],
    [ { label:'?123', w:72, bg:'#2D2D2D', fs:20 },
      { label:'Fn',  w:48, bg:'#2D2D2D', fs:18, fw:500 },
      { label:',',   w:48, bg:'#2D2D2D', fs:28, onTap:()=>typeChar(',') },
      { label:'',    w:230, bg:'#474747', space:true },
      { label:'.',   w:52, bg:'#2D2D2D', fs:18, fw:500, onTap:()=>typeChar('.') },
      { icon:'enter', w:78, bg:'#636363', onTap:doEnter } ],
  ];
}

function buildKeyboard(){
  const kb=document.getElementById('keyboard'); kb.innerHTML='';
  kbLayout().forEach(rowKeys=>{
    const row=document.createElement('div'); row.className='krow';
    rowKeys.forEach(k=>{
      const touch=document.createElement('div'); touch.className='ktouch'; touch.style.width=k.w+'px';
      const key=document.createElement('div'); key.className='kkey';
      key.style.width=(k.w-8)+'px'; key.style.background=k.bg;
      if(k.fs) key.style.fontSize=k.fs+'px';
      if(k.fw) key.style.fontWeight=k.fw;
      if(k.icon) key.innerHTML=KEY_ICONS[k.icon];
      else key.textContent=k.label;
      if(k.space){ key.classList.add('spacekey'); attachSpace(key); }
      else if(k.onTap) key.onclick=k.onTap;
      touch.appendChild(key);
      row.appendChild(touch);
    });
    kb.appendChild(row);
  });
}

// spacebar trackpad: hold/drag → cursor mode. swipe ←→ moves the text caret,
// swipe ↑↓ acts as arrow keys; a plain tap types a space.
function attachSpace(key){
  const kb=document.getElementById('keyboard');
  const CHAR_PX=12, STEP_PX=30;
  let down=false, active=false, holdT=null, sx=0, sy=0, sCur=0, axis=null, vApplied=0, didMove=false;
  function enter(){ active=true; kb.classList.add('cursor'); }
  function exit(){ active=false; kb.classList.remove('cursor'); }
  key.addEventListener('pointerdown',e=>{
    e.stopPropagation();                         // keep the surface close-gesture out of it
    down=true;
    sx=e.clientX; sy=e.clientY; sCur=state.cursorPos; axis=null; vApplied=0; didMove=false;
    try{key.setPointerCapture(e.pointerId);}catch(_){}
    holdT=setTimeout(enter,180);                 // press-and-hold enters cursor mode
  });
  key.addEventListener('pointermove',e=>{
    if(!down) return;                            // ignore hover — only while actually pressed
    e.stopPropagation();
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!active && (Math.abs(dx)>6||Math.abs(dy)>6)){ clearTimeout(holdT); enter(); }
    if(!active) return;
    didMove=true;
    if(axis===null && (Math.abs(dx)>4||Math.abs(dy)>4)) axis=Math.abs(dx)>=Math.abs(dy)?'x':'y';
    if(axis==='x'){
      state.cursorPos=Math.max(0,Math.min(state.query.length, sCur+Math.round(dx/CHAR_PX)));
      update();
    } else if(axis==='y'){
      const step=Math.round(dy/STEP_PX);          // down = positive
      while(vApplied<step){ arrowDown(); vApplied++; }
      while(vApplied>step){ arrowUp();   vApplied--; }
    }
  });
  function endP(){
    if(!down) return;
    down=false; clearTimeout(holdT);
    if(active) exit();
    else if(!didMove) typeChar(' ');             // quick tap = space
  }
  key.addEventListener('pointerup',endP);
  key.addEventListener('pointercancel',endP);
}

function setKeyboard(on){
  state.onScreenKB=on;
  const kb=document.getElementById('keyboard');
  const tg=document.getElementById('kbToggle');
  const lbl=document.getElementById('kbToggleLbl');
  if(on){
    kb.classList.remove('hidden');
    tg.classList.remove('on');
    lbl.textContent='On-screen KB';
  }else{
    kb.classList.add('hidden');
    tg.classList.add('on');
    lbl.textContent='Connected KB';
  }
}
document.getElementById('kbToggle').onclick=()=>setKeyboard(!state.onScreenKB);

document.getElementById('chipsToggle').onclick=function(){
  state.showChips=!state.showChips;
  this.classList.toggle('on', state.showChips);
  renderChips();
};

// bar ✕ — touch-centric: clears the text if any, else closes the whole surface
document.getElementById('barClose').onclick=()=>{
  if(state.query){ setQuery(''); }
  else if(window.closeSurface){ window.closeSurface(); }
};

/* =====================================================================
   TOUCH — drag/swipe to scroll the results list
   (real touch uses native momentum scroll; this adds mouse-drag in preview
    and a tap-vs-drag guard so a swipe doesn't accidentally open a row)
   ===================================================================== */
(function(){
  const el=document.getElementById('results');
  let dragging=false, startX=0, startY=0, startTop=0, hRow=null, startLeft=0, axis=null, moved=false, pid=null, closing=false;
  el.addEventListener('pointerdown',e=>{
    if(e.pointerType==='touch') return;          // let native momentum handle touch
    dragging=true; moved=false; axis=null; closing=false; pid=e.pointerId;
    startX=e.clientX; startY=e.clientY; startTop=el.scrollTop;
    hRow=e.target.closest('.tilerow');           // a horizontal scroller under the pointer?
    startLeft=hRow?hRow.scrollLeft:0;
    el.style.cursor='grabbing';
  });
  el.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(!axis && (Math.abs(dx)>4||Math.abs(dy)>4)){  // lock the dominant axis once moved
      axis=(hRow && Math.abs(dx)>Math.abs(dy))?'x':'y';
      moved=true; try{el.setPointerCapture(pid);}catch(_){}
    }
    if(axis==='x'){ hRow.scrollLeft=startLeft-dx; }
    else if(axis==='y'){
      // overscroll down while at the very top → pull the whole surface closed
      if((closing || (startTop<=0 && dy>0)) && window.__surfDrive && window.__surfDrive.isOpen()){
        closing=true; window.__surfDrive.move(dy);
      } else {
        el.scrollTop=startTop-dy;
      }
    }
  });
  function end(){
    dragging=false; el.style.cursor='grab';
    if(closing && window.__surfDrive){ window.__surfDrive.end(); closing=false; }
  }
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
  // swallow the click that follows a drag so rows aren't activated by a swipe
  el.addEventListener('click',e=>{ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);
})();

/* =====================================================================
   SURFACE GESTURE — home → dock → search (swipe up), swipe down to close
   One continuous drag drives a 0→1 progress: dock rises first, then the
   search surface slides up from the bottom over it.
   ===================================================================== */
(function(){
  const phone=document.getElementById('phone');
  const home=document.getElementById('homeLayer');
  const dock=document.getElementById('dockLayer');
  const surf=document.getElementById('searchSurface');
  const topbar=document.getElementById('topbar');
  const kb=document.getElementById('keyboard');
  const bar=document.getElementById('bar');
  const OPEN_DIST=260;
  let progress=0, opened=false, dragging=false, startY=0, startP=0, moved=false;
  let lastY=0, lastT=0, vel=0;     // px/ms, +ve = moving down (for flick detection)
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  function apply(p){
    // phase 1 (0→0.5): dock rises fully into view.
    // phase 2 (0.5→1): search surface rises from bottom; dock recedes back down.
    const dockY = p<=0.5 ? (1-p/0.5)*100 : ((p-0.5)/0.5)*100;
    const searchY = (1-clamp((p-0.5)/0.5,0,1))*100;
    dock.style.transform='translateY('+dockY+'%)';
    surf.style.transform='translateY('+searchY+'%)';
  }
  function snap(toOpen){
    opened=toOpen; progress=toOpen?1:0; apply(progress);
    if(!toOpen){ closeApp(); setQuery(''); }   // reset the search when closed
  }
  apply(0);                                    // start on the home screen
  window.closeSurface=()=>snap(false);         // let the bar's ✕ dismiss the whole surface
  // drive a close from the results list when it's overscrolled down at the top
  window.__surfDrive={
    move(downDy){ phone.classList.add('dragging'); progress=clamp(1-downDy/OPEN_DIST,0,1); apply(progress); },
    end(){ phone.classList.remove('dragging'); snap(progress>0.7); },   // pulled down enough → close
    isOpen(){ return opened; }
  };

  let capEl=null;
  function begin(e,el){ dragging=true; moved=false; startY=e.clientY; startP=progress; capEl=el;
    lastY=e.clientY; lastT=performance.now(); vel=0; phone.classList.add('dragging'); }
  function move(e){
    if(!dragging) return;
    const now=performance.now(), dt=now-lastT;
    if(dt>0) vel=(e.clientY-lastY)/dt;          // track flick velocity (+ = downward)
    lastY=e.clientY; lastT=now;
    const dy=startY-e.clientY;                  // up = positive
    // only capture (and move) once it's clearly a drag — so taps stay taps
    if(!moved && Math.abs(dy)>4){ moved=true; try{capEl.setPointerCapture(e.pointerId);}catch(_){} }
    if(moved){ progress=clamp(startP+dy/OPEN_DIST,0,1); apply(progress); }
  }
  function end(){
    if(!dragging) return; dragging=false;
    phone.classList.remove('dragging');
    if(!moved) return;                          // a tap leaves state as-is
    let toOpen;
    if(vel>0.45) toOpen=false;                  // flick down → close
    else if(vel<-0.45) toOpen=true;             // flick up → open
    else if(startP>0.5) toOpen = progress>0.78; // closing: a modest down-drag commits
    else toOpen = progress>0.35;                // opening: drag up ~1/3
    snap(toOpen);
  }

  // open — swipe up on the home screen
  home.addEventListener('pointerdown',e=>{ if(opened) return; begin(e,home); });
  home.addEventListener('pointermove',move);
  home.addEventListener('pointerup',end);
  home.addEventListener('pointercancel',end);

  // close — swipe down on the top chrome, search bar, or keyboard (active while open)
  [topbar,bar,kb].forEach(el=>{
    el.addEventListener('pointerdown',e=>{ if(!opened) return; begin(e,el); });
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',end);
    el.addEventListener('pointercancel',end);
    // swallow the trailing tap only if it was a drag, so keys/toggles still fire on tap
    el.addEventListener('click',e=>{ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);
  });
})();

/* =====================================================================
   BOOT
   ===================================================================== */
buildKeyboard();
setKeyboard(true);
update();           // empty state, cursor blinking
</script>
</body>
</html>

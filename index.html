<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecha Comet — Search Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* greyscale by elevation — higher z-index = lighter */
      --bg: #000000;
      /* z0 device surface */
      --l1: #141414;
      /* z1 cards: tiles, chips, bar, fn keys */
      --l2: #1e1e1e;
      /* z2 sub-elements: icons, option buttons */
      --l3: #2a2a2a;
      /* z3 most-raised: key tops */
      --sel: #1c1c1c;
      /* selected fill */
      --sel-ring: #4a4a4a;
      /* selection indicator (spaced 2px out) */
      --txt: #e9e9e9;
      --txt-dim: #8a8a8a;
      --txt-faint: #5a5a5a;
      --accent: #7aa2ff;
      --r: 4px;
      /* global corner radius */
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    /* hide every scrollbar */
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    /* no page scroll/bars */
    body {
      background: #0a0a0a;
      font-family: 'Sora', system-ui, sans-serif;
      color: var(--txt);
    }

    /* ---------- device frame (square, no stroke) ----------
     the single device div: holds the home screen AND the search surface,
     dead-centered in the page both axes regardless of viewport size */
    .phone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 540px;
      height: 620px;
      background: var(--bg);
      box-shadow: 0 24px 60px rgba(0, 0, 0, .6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---------- top bar (toggle) ---------- */
    .topbar {
      height: 40px;
      flex: 0 0 40px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }

    /* toggles — 25% smaller than baseline */
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--l1);
      border-radius: var(--r);
      padding: 4px 8px 4px 5px;
      cursor: pointer;
      user-select: none;
    }

    .toggle .knob {
      width: 22px;
      height: 14px;
      border-radius: var(--r);
      background: var(--l2);
      position: relative;
      transition: background .18s;
      flex: 0 0 auto;
    }

    .toggle .knob::after {
      content: '';
      position: absolute;
      top: 1.5px;
      left: 1.5px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #6e6e6e;
      transition: transform .18s, background .18s;
    }

    .toggle.on .knob {
      background: #2a3550;
    }

    .toggle.on .knob::after {
      transform: translateX(8px);
      background: var(--accent);
    }

    .toggle .lbl {
      font-size: 8px;
      color: var(--txt-dim);
      letter-spacing: .2px;
    }

    /* ---------- content stack ---------- */
    .stack {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      /* anchor for the floating recent overlay */
    }

    /* ---------- recent-search overlay (SOLID window floating above the bar) ---------- */
    .recent-ov {
      position: absolute;
      left: 30px;
      bottom: 84px;
      /* just above the search bar */
      width: 300px;
      z-index: 6;
      background: #1c1c1c;
      /* solid window — clearly raised off the black surface */
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 44px rgba(0, 0, 0, .65);
    }

    .recent-ov.hidden {
      display: none;
    }

    /* the rows scroll inside the solid window */
    .rov-list {
      max-height: 132px;
      /* ~3.5 rows visible; the rest scrolls */
      overflow-y: auto;
      padding: 6px 0;
      touch-action: pan-y;
      overscroll-behavior: contain;
    }

    /* fixed gradient layer over the older queries — fades text into the solid bg,
       window edges stay crisp */
    .rov-fade {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 46px;
      pointer-events: none;
      background: linear-gradient(to bottom, #1c1c1c 0%, rgba(28, 28, 28, 0) 100%);
    }

    .recent-ov .rov-row {
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: var(--txt-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .recent-ov .rov-row.sel {
      background: #2e2e2e;
      color: #fff;
      border-radius: 6px;
      margin: 0 6px;
      padding: 8px 10px;
    }

    /* ---------- Minecraft-style positional argument stack ---------- */
    .arg-stack {
      position: absolute;
      z-index: 7;
      min-width: 96px;
      max-width: 240px;
      background: #1c1c1c;
      border-radius: 10px;
      padding: 5px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .6);
      overflow: hidden;
    }

    .arg-stack.hidden {
      display: none;
    }

    .arg-row {
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      line-height: 20px;
      color: var(--txt-dim);
      white-space: nowrap;
      cursor: pointer;
    }

    /* highlighted option — lighter pill, white text (matches the bar ghost) */
    .arg-row.sel {
      background: #3a3a3a;
      color: #fff;
    }

    /* the already-typed prefix reads dim, the completion bright */
    .arg-row .arg-pre {
      color: var(--txt-faint);
    }

    .arg-row.sel .arg-pre {
      color: #c8c8c8;
    }

    /* ---------- slash-code picker overlay ---------- */
    .code-ov {
      position: absolute;
      left: 30px;
      bottom: 84px;
      /* just above the bar */
      width: 270px;
      max-height: 264px;
      /* ~5.5 cards, scrolls beyond */
      overflow-y: auto;
      z-index: 7;
      background: #1c1c1c;
      border-radius: 16px;
      padding: 6px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, .65);
    }

    .code-ov.hidden {
      display: none;
    }

    .code-ov::-webkit-scrollbar {
      width: 0;
    }

    .code-card {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .code-card.sel {
      background: #2e2e2e;
    }

    .code-card .code-token {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      min-width: 30px;
    }

    .code-card .code-appname {
      color: var(--txt);
    }

    /* empty-state "/" square in the bar — taps to open the code picker */
    .sicon.slash {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: var(--l2);
      color: var(--txt-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* list-mode arg options — icon-less rows in the results list */
    .arg-listrow {
      padding-left: 4px;
    }

    .arg-listrow .rtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
    }

    .arg-listrow .arg-pre {
      color: var(--txt-faint);
    }

    /* neutral-state Recent activity (under the pinned apps) — styled per the reference image:
       larger rounded app icon + App › action title, hairline separators between rows. */
    .recent-peek {
      margin-top: 34px;
    }

    .recent-peek .list-title {
      padding-bottom: 8px;
      text-transform: none;       /* sentence case: "Recent searches" */
      letter-spacing: normal;
      font-size: 13px;
    }

    /* grouped section: gray rounded panel, rows divided by inset hairlines */
    .recent-peek .cardgroup {
      background: var(--l1);
      border-radius: 16px;
      padding: 0 14px;
    }

    .recent-peek .cardgroup .row {
      gap: 13px;
      padding: 11px 0;
      border-bottom: 1px solid var(--l2);
      border-radius: 0;
    }

    .recent-peek .cardgroup .row:last-child {
      border-bottom: none;
    }

    /* plain text, same monospace query text the recall overlay shows */
    .recent-peek .row .rtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: var(--txt-dim);
    }

    /* Tab-selected recent row — a lighter pill within the section (no outer ring) */
    .recent-peek .cardgroup .row.sel {
      background: var(--l3);
      box-shadow: none;
      border-radius: 8px;
      border-bottom-color: transparent;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }

    .recent-peek .cardgroup .row.sel .rtitle {
      color: #fff;
    }

    /* results region grows; scrolls if needed */
    /* 30px side gutter: app tiles, card icons & query text all line up here */
    .results {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* momentum swipe on touch */
      touch-action: pan-y;
      overscroll-behavior: contain;
      cursor: grab;
      padding: 8px 30px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* fade both edges: top edge cues "more above" when the list scrolls (recall, long results),
         bottom edge hides a stray sliver above the chips/bar */
      -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 22px, #000 calc(100% - 16px), transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 22px, #000 calc(100% - 16px), transparent 100%);
    }

    .results::-webkit-scrollbar {
      width: 0;
    }

    /* pinned (empty state) — 64px tiles, left-aligned to the 30px gutter,
     same tile size + start + gap as the search app row so they read as one grid */
    .pinned-wrap {
      padding: 18px 30px 4px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior: contain;
      /* fade the bottom edge so the last recent row dissolves toward the keyboard/bar */
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 20px), transparent 100%);
      mask-image: linear-gradient(to bottom, #000 calc(100% - 20px), transparent 100%);
    }

    .pinned-wrap::-webkit-scrollbar {
      width: 0;
    }

    .pinned-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--txt-faint);
      margin-bottom: 12px;
    }

    .pinned-row {
      display: flex;
      gap: 52px;
    }

    .pin {
      flex: 0 0 64px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .pin .tile {
      width: 64px;
      height: 64px;
      border-radius: var(--r);
      background: var(--l1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--txt-dim);
      text-transform: lowercase;
      transition: transform .12s, box-shadow .12s;
    }

    /* selection sits 2px outside the tile (2px invisible gap, then ring) */
    .pin.sel .tile {
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--sel-ring);
    }

    .pin:active .tile {
      transform: scale(.94);
    }

    .pin .plabel {
      font-size: 16px;
      color: #ffffff;
      white-space: nowrap;
    }

    /* result row — icon sits on the 30px gutter (no extra left padding) */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-radius: var(--r);
      cursor: pointer;
      background: transparent;
    }

    /* selection: 2px invisible gap from the row, then a ring rises outside it */
    .row.sel {
      background: var(--sel);
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--sel-ring);
    }

    /* list section title (e.g. Recent searches) */
    .list-title {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--txt-faint);
      text-transform: uppercase;
      padding: 2px 0 8px;
    }

    /* grouped list — hairline separators so rows read as one group */
    .cardgroup {
      display: flex;
      flex-direction: column;
    }

    .cardgroup .row {
      border-bottom: 1px solid var(--l2);
      border-radius: 0;
      padding: 11px 0;
    }

    .cardgroup .row:last-child {
      border-bottom: none;
    }

    .cardgroup .row.sel {
      border-bottom-color: transparent;
    }

    .row .ricon {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      border-radius: var(--r);
      background: var(--l2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--txt-dim);
      text-transform: lowercase;
    }

    .row .rbody {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 2px;
      flex: 1;
    }

    .row .rtitle {
      font-size: 15px;
      color: var(--txt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row .rsub {
      font-size: 12px;
      color: var(--txt-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* dual-option (web / files) trailing buttons */
    .row .ractions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .ractions .opt {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--l2);
      border-radius: var(--r);
      padding: 5px 9px;
      cursor: pointer;
    }

    .ractions .opt:active {
      background: var(--l3);
    }

    .ractions .opt .oicon {
      font-size: 8px;
      text-transform: lowercase;
    }

    .ractions .opt .olabel {
      font-size: 11px;
      color: var(--txt-dim);
    }

    .ractions .opt.primary {
      background: var(--l3);
    }

    /* answer row (math/peek) — grey frame, accent text only */
    .row.answer {
      background: var(--l2);
    }

    .row.answer .ricon {
      background: var(--l3);
      color: #bcd0ff;
    }

    .row.answer .rtitle {
      font-size: 18px;
      font-weight: 500;
      color: #dfe8ff;
    }

    .answer-div {
      height: 1px;
      background: var(--l2);
      margin: 2px 0;
    }

    /* tile row (app matches + search routes) — horizontally swipeable, aligned to gutter.
     4px padding + -4px margin gives the selection ring room without breaking alignment. */
    /* search app row — 64px tiles, gap 52, starts at the 30px gutter (via results
     padding), scrolls horizontally showing ~4.25 tiles as a "more" cue */
    .tilerow {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      gap: 52px;
      flex: 0 0 auto;
      height: 100px;
      /* definite height: scroll container needs it */
      padding: 4px 0;
      overflow-x: auto;
      overflow-y: hidden;
      touch-action: pan-x;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    .gtile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      width: 64px;
      flex: 0 0 64px;
    }

    .gtile .gbox {
      width: 64px;
      height: 64px;
      flex: 0 0 64px;
      border-radius: var(--r);
      background: var(--l1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      text-transform: lowercase;
      transition: transform .12s, box-shadow .12s;
    }

    .gtile.sel .gbox {
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--sel-ring);
    }

    .gtile:active .gbox {
      transform: scale(.94);
    }

    .gtile .glabel {
      font-size: 14px;
      color: #ffffff;
      white-space: nowrap;
    }

    /* grayed TUI code shown under the app name */
    .gcode,
    .pin .gcode {
      font-size: 11px;
      color: var(--txt-faint);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }

    /* general-search block: query text + route tiles — aligned to gutter */
    .searchblock {
      padding: 8px 0 4px;
    }

    .searchblock .searchquery {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 14px;
      padding: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .searchblock .tilerow {
      overflow-x: visible;
    }

    /* ---------- chips ---------- */
    .chips {
      display: flex;
      gap: 8px;
      padding: 6px 14px 8px;
      flex: 0 0 auto;
      min-height: 0;
    }

    .chips.hidden {
      display: none;
    }

    .chip {
      background: var(--l1);
      border-radius: var(--r);
      padding: 6px 12px;
      font-size: 12px;
      color: var(--txt-dim);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip:active {
      background: var(--l2);
    }

    /* ---------- search bar (always bottom-stuck; on top of kb when shown) ---------- */
    .bar {
      flex: 0 0 auto;
      margin: 0 14px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--l1);
      border-radius: 18px;
      padding: 13px 18px;
      min-height: 68px;
    }

    .bar .sicon {
      font-size: 11px;
      color: var(--txt-dim);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
    }

    .bar .sicon.app {
      width: 22px;
      height: 22px;
      border-radius: var(--r);
      font-size: 8px;
      text-transform: lowercase;
      color: #fff;
    }

    .bar .field {
      flex: 1;
      font-size: 16px;
      display: flex;
      align-items: center;
      white-space: pre;
      overflow: hidden;
    }

    .bar .barclose {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--l2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--txt-dim);
      cursor: pointer;
      user-select: none;
    }

    .bar .barclose:active {
      background: var(--l3);
    }

    .bar .ph {
      color: var(--txt-faint);
    }

    .tok {
      transition: color .1s;
    }

    .ghost {
      color: var(--txt-faint);
      opacity: .6;
    }

    .caret {
      width: 2px;
      height: 20px;
      background: #ffffff;
      display: inline-block;
      margin: 0 1px;
      animation: blink 1.05s steps(1) infinite;
      vertical-align: middle;
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    /* ---------- on-screen keyboard (kbd-alpha) ---------- */
    .keyboard {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6px 0px 10px;
      position: relative;
      width: 540px;
      height: 240px;
      flex: 0 0 240px;
      background: #000000;
    }

    .keyboard.hidden {
      display: none;
    }

    .krow {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: 540px;
      height: 56px;
    }

    .ktouch {
      position: relative;
      height: 56px;
      flex: none;
      box-sizing: border-box;
    }

    .kkey {
      position: absolute;
      left: 4px;
      top: 4px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 28px;
      color: #DDDDDD;
      cursor: pointer;
      user-select: none;
      line-height: 1;
    }

    .kkey:active {
      filter: brightness(1.35);
    }

    .kkey svg {
      display: block;
    }

    /* spacebar trackpad/cursor mode: hide glyphs, darken other keys, brighten space */
    .keyboard.cursor .kkey {
      color: transparent;
      background: #161616 !important;
    }

    .keyboard.cursor .kkey svg {
      opacity: 0;
    }

    .keyboard.cursor .spacekey {
      background: #6a6a6a !important;
    }

    /* spacebar owns its own touch — stop the browser hijacking the drag as a scroll */
    .spacekey { touch-action: none; }

    /* ---------- launched app screen ---------- */
    .appscreen {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      z-index: 30;
    }

    .appscreen.show {
      display: flex;
    }

    .appscreen .ahead {
      height: 46px;
      flex: 0 0 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: var(--l1);
    }

    .appscreen .aback {
      font-size: 13px;
      color: var(--txt-dim);
      cursor: pointer;
    }

    .appscreen .atitle {
      font-size: 14px;
      color: var(--txt);
    }

    .appscreen .abody {
      flex: 1;
      padding: 18px;
      overflow: auto;
    }

    .term {
      font-family: 'Sora', monospace;
      font-size: 13px;
      color: #cfcfcf;
      line-height: 1.7;
    }

    .term .pmpt {
      color: #ff9d4d;
    }

    .term .out {
      color: var(--txt-dim);
    }

    /* ---------- toast ---------- */
    .toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      background: var(--l3);
      color: #eee;
      font-size: 13px;
      padding: 9px 16px;
      border-radius: var(--r);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      z-index: 40;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---------- home / dock / search-surface layers ---------- */
    #homeLayer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #5b6cc4 url('home.png') center/cover no-repeat;
      touch-action: none;
      cursor: grab;
    }

    #dockLayer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 86px;
      z-index: 2;
      background: #000 url('Dock.png') center/contain no-repeat;
      transform: translateY(100%);
    }

    #searchSurface {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      transform: translateY(100%);
    }

    /* smooth snap when not actively dragging */
    #phone:not(.dragging) #dockLayer,
    #phone:not(.dragging) #searchSurface {
      transition: transform .28s cubic-bezier(.22, .61, .36, 1);
    }
  </style>
</head>

<body>
  <div class="phone" id="phone">
    <!-- base home screen -->
    <div id="homeLayer"></div>
    <!-- navigation dock (revealed on swipe up) -->
    <div id="dockLayer"></div>

    <!-- the search surface — slides up from the bottom over home -->
    <div id="searchSurface">
      <div class="topbar" id="topbar">
        <div class="toggle" id="kbToggle" title="Toggle on-screen / connected keyboard">
          <span class="knob"></span>
          <span class="lbl" id="kbToggleLbl">On-screen KB</span>
        </div>
        <div class="toggle" id="chipsToggle" title="Toggle suggestion chips">
          <span class="knob"></span>
          <span class="lbl">Chips</span>
        </div>
        <div class="toggle" id="recentToggle" title="Recent-search overlay">
          <span class="knob"></span>
          <span class="lbl">Recent overlay</span>
        </div>
        <div class="toggle" id="listToggle" title="Command args as a results list instead of the floating stack">
          <span class="knob"></span>
          <span class="lbl">codeargs overlay</span>
        </div>
      </div>

      <div class="stack">
        <!-- empty-state pinned -->
        <div class="pinned-wrap" id="pinnedWrap">
          <div class="pinned-row" id="pinnedRow"></div>
          <div class="recent-peek" id="recentPeek"></div>
        </div>

        <!-- typing-state results -->
        <div class="results" id="results" style="display:none;"></div>

        <!-- chips -->
        <div class="chips hidden" id="chips"></div>

        <!-- search bar -->
        <div class="bar" id="bar">
          <span class="sicon" id="sicon">⌕</span>
          <div class="field" id="field"></div>
          <div class="barclose" id="barClose" title="Clear / close"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg></div>
        </div>

        <!-- recent-search overlay (solid window floating above the bar, over the live results) -->
        <div id="recentOverlay" class="recent-ov hidden">
          <div class="rov-list" id="recentList"></div>
          <div class="rov-fade"></div>
        </div>

        <!-- Minecraft-style positional argument stack (anchored above the caret in code mode) -->
        <div id="argStack" class="arg-stack hidden"></div>

        <!-- slash-code picker (list of all codes, floats above the bar) -->
        <div id="codeList" class="code-ov hidden"></div>
      </div>

      <!-- on-screen keyboard -->
      <div class="keyboard" id="keyboard"></div>

      <!-- launched app screen overlay -->
      <div class="appscreen" id="appscreen">
        <div class="ahead">
          <span class="aback" id="aback">‹ back</span>
          <span class="atitle" id="atitle"></span>
        </div>
        <div class="abody" id="abody"></div>
      </div>

      <div class="toast" id="toast"></div>
    </div><!-- /searchSurface -->
  </div><!-- /phone (device) -->

  <script>
    /* =====================================================================
       CONFIG  (data, not hardcoded branches)
       ===================================================================== */
    const ACCENTS = {
      terminal: '#ff9d4d', files: '#5ec8a0', settings: '#7aa2ff',
      modules: '#c08cff', audio: '#ff6f9c', camera: '#ffd24d', calc: '#9bd0ff',
    };

    // app-icon images by app id (folder name has a space → URL-encode it).
    // apps not listed here fall back to the 3-letter text tile.
    const ICONS = {
      camera: 'app%20icons/camera.png',
      terminal: 'app%20icons/Terminal.png',
      files: 'app%20icons/Files.png',
      settings: 'app%20icons/Settings.png',
      audio: 'app%20icons/music.png',
      notes: 'app%20icons/notes.png',
    };

    // the action that Enter will perform on each result type — shown grey, ahead of the
    // typed text ("— open"), so you see what's about to happen before you commit.
    const ACTION_VERB = {
      app: 'open', action: 'open', code: 'run',
      web: 'search web', filesroute: 'search in Files',
    };
    // §6 slash codes — a leading "/" scopes the search to a command. Keyed by the single
    // letter after the slash: /t /f /s /m /x , plus /? for the system panel.
    const CODES = {
      t: {
        app: 'Terminal', appId: 'terminal', accent: ACCENTS.terminal,
        args: ['cd', 'ls', 'pwd', 'cd ~/downloads']
      },
      f: {
        app: 'Files', appId: 'files', accent: ACCENTS.files,
        args: ['~/downloads', '~/dl/*.png', 'recent', '~/photos']
      },
      s: {
        app: 'Settings', appId: 'settings', accent: ACCENTS.settings,
        args: ['wifi off', 'bright 40', 'bluetooth', 'airplane on']
      },
      x: {
        app: 'Modules', appId: 'modules', accent: ACCENTS.modules,
        args: ['gamepad', 'keyboard', 'lidar', 'thermal']
      },
      m: {
        app: 'Music', appId: 'audio', accent: ACCENTS.audio,
        args: ['vol 60', 'mute', 'output', 'balance']
      },
    };

    // the slash-code picker menu (overlay list): each command + the system panel.
    const CODE_MENU = [
      ...Object.entries(CODES).map(([c, v]) => ({ code: c, app: v.app, accent: v.accent })),
      { code: '?', app: 'System info', accent: '#9bd0ff' },
    ];

    // positional argument grammar (Minecraft-command style): for each code, `_` is the
    // first-position option set; each value key maps to the NEXT position's options for
    // that value. The suggestion stack walks this tree one argument at a time.
    const ARG_TREE = {
      t: {
        _: ['cd', 'ls', 'pwd', 'cat', 'clear'],
        cd: ['~/', '~/downloads', '~/photos', '..'],
        ls: ['-l', '-a', '~/'],
        cat: ['notes.md', 'log.txt'],
      },
      f: {
        _: ['~/downloads', '~/photos', 'recent', 'trash', '*.png'],
      },
      s: {
        _: ['wifi', 'brightness', 'bluetooth', 'airplane'],
        wifi: ['off', 'on'], bluetooth: ['off', 'on'], airplane: ['off', 'on'],
        brightness: ['10', '40', '70', '100'],
      },
      x: {
        _: ['gamepad', 'keyboard', 'lidar', 'thermal'],
        gamepad: ['connect', 'disconnect'], keyboard: ['connect', 'disconnect'],
        lidar: ['on', 'off'], thermal: ['on', 'off'],
      },
      m: {
        _: ['play', 'pause', 'next', 'prev', 'vol', 'shuffle'],
        vol: ['0', '30', '60', '100'], shuffle: ['on', 'off'],
      },
    };

    // reverse map: app id → its slash code letter (for the grayed "/t" shown under tiles)
    const CODE_BY_APP = Object.fromEntries(Object.entries(CODES).map(([c, v]) => [v.appId, c]));

    // searchable app registry (fuzzy-matched, launcher mode)
    const APPS = [
      { id: 'camera', label: 'Camera', accent: ACCENTS.camera, sub: 'photo · video' },
      { id: 'terminal', label: 'Terminal', accent: ACCENTS.terminal, sub: 'shell · /t' },
      { id: 'files', label: 'Files', accent: ACCENTS.files, sub: 'explorer · /f' },
      { id: 'settings', label: 'Settings', accent: ACCENTS.settings, sub: 'system · /s' },
      { id: 'calc', label: 'Calculator', accent: ACCENTS.calc, sub: 'math' },
      { id: 'modules', label: 'Modules', accent: ACCENTS.modules, sub: 'hot-swap · /x' },
      { id: 'audio', label: 'Music', accent: ACCENTS.audio, sub: 'sound · /m' },
      { id: 'maps', label: 'Maps', accent: '#86d07a', sub: 'navigation' },
      { id: 'camera2', label: 'Camera Roll', accent: ACCENTS.camera, sub: 'gallery' },
      { id: 'notes', label: 'Notes', accent: '#dfe4ea', sub: 'jot · markdown' },
    ];

    // in-app actions / widgets (§4.4)  "App › sub-feature"
    const ACTIONS = [
      { id: 'set-wifi', app: 'Settings', appId: 'settings', accent: ACCENTS.settings, label: 'Settings › wifi', icon: 'set' },
      { id: 'set-bri', app: 'Settings', appId: 'settings', accent: ACCENTS.settings, label: 'Settings › brightness', icon: 'set' },
      { id: 'cam-vid', app: 'Camera', appId: 'camera', accent: ACCENTS.camera, label: 'Camera › video', icon: 'cam' },
      { id: 'set-air', app: 'Settings', appId: 'settings', accent: ACCENTS.settings, label: 'Settings › airplane', icon: 'set' },
      { id: 'snd-vol', app: 'Music', appId: 'audio', accent: ACCENTS.audio, label: 'Music › volume', icon: 'mus' },
      { id: 'snd-bal', app: 'Music', appId: 'audio', accent: ACCENTS.audio, label: 'Music › balance', icon: 'mus' },
    ];

    // §Config — pinned apps (4); #1 is implicit Enter target on empty
    const PINNED = [
      { id: 'camera', label: 'Camera', accent: ACCENTS.camera },
      { id: 'terminal', label: 'Terminal', accent: ACCENTS.terminal },
      { id: 'files', label: 'Files', accent: ACCENTS.files },
      { id: 'settings', label: 'Settings', accent: ACCENTS.settings },
    ];

    /* =====================================================================
       STATE
       ===================================================================== */
    const state = {
      query: '',
      cursorPos: 0,           // caret index within query (for spacebar-cursor editing)
      selectedIndex: 0,
      results: [],
      chips: [],
      tokenCode: null,        // active recognized code object (for bar/icon styling)
      ghost: '',              // tab-completion ghost text
      neutralSel: 0,          // neutral-state selection: 0..3 = pinned apps, then recent rows
      onScreenKB: true,
      showAllApps: false,     // app-tile row: top 4 + "more", or all
      showChips: false,       // suggestion chips off by default (top-bar toggle)
      showRecent: false,      // recent-search recall panel (↑ on empty bar)
      recentOverlay: true,    // recall style: floating overlay (on) vs full list (off) — top-bar toggle
      cmdSel: 0,              // highlighted option in the positional argument stack
      argList: false,         // arg options as a results list (on) vs floating stack (off) — top-bar toggle
      _argSug: null,          // current arg suggestions {code, options, partial, completed} or null
      _argSig: null,          // signature of the current option set (resets cmdSel when it changes)
      recent: [               // recent search queries, most-recent first (raw text, incl. slash-code ones)
        '/s wifi off', '/t cd ~/downloads', '2 + 5', '/f ~/photos', '/m vol 60',
        'wifi', 'brightness 40', '/s bluetooth', 'maps', 'camera',
      ],
    };

    /* =====================================================================
       PARSE  (§8)  input string -> { mode, code?, query, args[] }
       ===================================================================== */
    function parseInput(str) {
      const raw = str;
      const trimmed = str.trim();
      if (trimmed === '') return { mode: 'empty', query: '' };

      // 1. slash command system — "/" scopes to a code
      if (trimmed.startsWith('/')) {
        const body = trimmed.slice(1);
        const first = body.split(/\s+/)[0].toLowerCase();
        if (first[0] === '?')                       // /? → system panel
          return { mode: 'peek', query: body.slice(1).trim(), raw };
        if (CODES[first]) {                          // /t, /f, /s, /m, /x → scoped command
          const rest = body.slice(first.length).trimStart();
          return { mode: 'code', code: first, query: rest, args: rest.length ? rest.split(/\s+/) : [], raw };
        }
        return { mode: 'slash', query: first, raw };  // "/" + partial → the code picker
      }

      // 2. inline operators
      if (trimmed.startsWith('?'))
        return { mode: 'peek', query: trimmed.slice(1).trim(), raw };

      const mathOnly = /^[\d\s+\-*/().%]+$/.test(trimmed.replace(/^=/, ''));
      const hasOp = /[+\-*/]/.test(trimmed.replace(/^=/, ''));
      if ((trimmed.startsWith('=') || hasOp) && mathOnly)
        return { mode: 'math', expr: trimmed.replace(/^=/, '').trim(), query: trimmed, raw };

      // 3+ plain query (launcher / action / file / web)
      return { mode: 'plain', query: trimmed, raw };
    }

    /* =====================================================================
       RESOLVE  (§4 hierarchy) -> ranked Result[]
       Result = { type, icon, accent, title, sub?, action() }
       ===================================================================== */
    function fuzzy(needle, hay) {
      needle = needle.toLowerCase(); hay = hay.toLowerCase();
      if (hay.startsWith(needle)) return 3;
      if (hay.includes(needle)) return 2;
      let i = 0; for (const c of hay) { if (c === needle[i]) i++; }
      return i === needle.length ? 1 : 0;
    }

    function resolve(p) {
      const out = [];

      if (p.mode === 'slash') return out;   // the code picker overlay handles this mode

      if (p.mode === 'math') {
        let val;
        try { val = Function('"use strict";return (' + p.expr + ')')(); } catch (e) { val = null; }
        if (val !== null && val !== undefined && !Number.isNaN(val)) {
          out.push({
            type: 'answer', icon: '=', accent: ACCENTS.calc, title: '= ' + val,
            sub: null, action: () => { copy(String(val)); toast('Copied ' + val); }
          });
        }
        // §4: regular results STILL appear below — Calculator app tile + search routes
        out.push(appResult(APPS.find(a => a.id === 'calc')));
        routeResults(p.query).forEach(r => out.push(r));
        return out;
      }

      if (p.mode === 'peek') {
        // ? shows the whole system panel at once. typing after ? filters the list.
        const READINGS = [
          { key: 'bat', label: 'Battery', val: '72% · 3h 41m left' },
          { key: 'net', label: 'Network', val: 'Wi-Fi · MechaNet · −48 dBm' },
          { key: 'cpu', label: 'CPU', val: '12% · 41°C' },
          { key: 'ram', label: 'Memory', val: '4.1 / 8 GB' },
          { key: 'dsk', label: 'Storage', val: '47 / 128 GB' },
          { key: 'upt', label: 'Uptime', val: '2d 14h 06m' },
          { key: 'ip', label: 'IP address', val: '192.168.1.42' },
          { key: 'os', label: 'OS', val: 'Mecha Linux 1.4 · kernel 6.8' },
        ];
        const q = (p.query || '').toLowerCase();
        const list = q ? READINGS.filter(r => r.key.includes(q) || r.label.toLowerCase().includes(q)) : READINGS;
        (list.length ? list : READINGS).forEach(r => out.push({
          type: 'peek', icon: r.key, accent: '#9bd0ff', title: r.label, sub: r.val,
          action: () => { copy(r.val); toast('Copied ' + r.label + ': ' + r.val); }
        }));
        return out;
      }

      if (p.mode === 'code') {
        const c = CODES[p.code];
        // scoped command mode — primary row = run-in-app
        out.push({
          type: 'code', icon: p.code, iconImg: ICONS[c.appId], accent: c.accent,
          title: c.app + (p.query ? ' · ' + p.query : ' (scoped)'),
          sub: p.query ? 'run: /' + p.code + ' ' + p.query : 'type args, Enter to run',
          action: () => runCode(p.code, p.query),
        });
        // show the underlying app too
        out.push(appResult(APPS.find(a => a.id === c.appId)));
        // even inside a scoped command, keep the web/files escape hatches (like plain strings)
        routeResults(p.query).forEach(r => out.push(r));
        return out;
      }

      // ---- plain: app matches (tiles) -> actions (cards) -> search routes (tiles)
      const q = p.query;

      const ranked = APPS.map(a => ({ a, s: fuzzy(q, a.label) }))
        .filter(x => x.s > 0).sort((x, y) => y.s - x.s);
      ranked.forEach(x => out.push(appResult(x.a)));

      ACTIONS.filter(ac => fuzzy(q, ac.label) > 0)
        .forEach(ac => out.push({
          type: 'action', icon: ac.icon, iconImg: ICONS[ac.appId], accent: ac.accent,
          title: ac.label, action: () => toast('Open ' + ac.label)
        }));

      // general-search routes — Search (web) + Files, rendered as side-by-side tiles
      routeResults(q).forEach(r => out.push(r));

      return out;
    }

    function appResult(a) {
      if (!a) return null;
      return {
        type: 'app', icon: a.id.slice(0, 3), iconImg: ICONS[a.id], accent: a.accent, title: a.label,
        code: CODE_BY_APP[a.id], action: () => launchApp(a.id, a.label)
      };
    }

    // the two general-search destinations, as tiles (like pinned apps)
    function routeResults(q) {
      return [
        {
          type: 'web', icon: '⌕', accent: '#cfd6e6', title: 'Search',
          action: () => toast('Searching web: ' + q)
        },
        {
          type: 'filesroute', icon: 'fil', iconImg: ICONS.files, accent: ACCENTS.files, title: 'Files',
          action: () => openFiles(q)
        },
      ];
    }

    /* =====================================================================
       CHIPS  (§5) — 3 live suggestions
       ===================================================================== */
    function buildChips(p) {
      if (p.mode === 'code') {
        const c = CODES[p.code];
        return c.args.slice(0, 3).map(arg => ({
          label: arg,
          apply: () => setQuery('/' + p.code + ' ' + arg)
        }));
      }
      if (p.mode === 'math') {
        return [{ label: 'copy answer', apply: () => { const r = state.results[0]; r && r.action(); } },
        { label: 'open Calculator', apply: () => launchApp('calc', 'Calculator') },
        { label: 'clear', apply: () => setQuery('') }];
      }
      if (p.mode === 'plain' && p.query) {
        const top = APPS.map(a => ({ a, s: fuzzy(p.query, a.label) })).filter(x => x.s > 0)
          .sort((x, y) => y.s - x.s).slice(0, 3);
        const chips = top.map(x => ({ label: x.a.label, apply: () => setQuery(x.a.label) }));
        const fallbacks = [
          { label: 'web: ' + p.query, apply: () => toast('Searching web: ' + p.query) },
          { label: 'files: ' + p.query, apply: () => openFiles(p.query) },
        ];
        let fi = 0; while (chips.length < 3) chips.push(fallbacks[fi++ % fallbacks.length]);
        return chips.slice(0, 3);
      }
      return [];
    }

    /* =====================================================================
       GHOST / TOKEN  (§3) — code autocompletion
       ===================================================================== */
    function computeGhost(p, raw) {
      if (p.mode !== 'plain' || !raw) return '';
      // terminal-style history autosuggest from recent searches
      const hist = state.recent.find(h =>
        h.toLowerCase().startsWith(raw.toLowerCase()) && h.length > raw.length);
      if (hist) return hist.slice(raw.length);
      return '';
    }

    // positional argument suggestions for a scoped command (Minecraft-style).
    // Walks ARG_TREE one completed arg at a time; the last (unfinished) token filters
    // the current position's options by prefix. raw = full bar text incl. trailing space.
    function argSuggest(code, raw) {
      const tree = ARG_TREE[code]; if (!tree) return null;
      const lead = raw.trimStart();
      const firstWord = lead.split(/\s+/)[0];
      const afterFirst = lead.slice(firstWord.length);     // leading sep space(s) + the args
      const endsSpace = afterFirst === '' || /\s$/.test(afterFirst);   // sitting on a fresh position
      const toks = afterFirst.split(/\s+/).filter(Boolean);
      const completed = endsSpace ? toks : toks.slice(0, -1);
      const partial = endsSpace ? '' : (toks[toks.length - 1] || '');
      // descend the tree by each completed arg
      let opts = tree._;
      for (const a of completed) {
        const next = tree[a];
        if (!next) return null;                            // no grammar past here → stop suggesting
        opts = next;
      }
      const options = opts.filter(o => o.toLowerCase().startsWith(partial.toLowerCase()));
      if (!options.length) return null;
      return { code, options, partial, completed };
    }

    /* =====================================================================
       PIPELINE  — single render entry
       ===================================================================== */
    // the result Enter would fire (the selected one) — drives the leading icon + action hint
    function primaryResult() {
      if (!state.results.length) return null;
      const i = Math.max(0, Math.min(state.selectedIndex, state.results.length - 1));
      return state.results[i] || state.results[0];
    }

    function update() {
      const raw = state.query;
      const p = parseInput(raw);

      state.tokenCode = (p.mode === 'code') ? CODES[p.code] : null;
      state.results = resolve(p).filter(Boolean);
      state.chips = buildChips(p);
      // autocomplete + action hint: only worth computing once there's a real query
      // (≥3 chars) — below that a single letter fuzzy-matches everything, so skip the work.
      state.ghost = '';
      state.ghostAction = '';
      const pr = (p.mode === 'plain' && p.query.length >= 3) ? primaryResult() : null;
      if (pr) {
        state.ghostAction = ACTION_VERB[pr.type] || '';
        // launching an app → complete to the full app name ("cam" → "camera — open")
        if ((pr.type === 'app' || pr.type === 'action') && pr.title.toLowerCase().startsWith(p.query.toLowerCase()))
          state.ghost = pr.title.slice(p.query.length);
        else
          state.ghost = computeGhost(p, raw);   // history / web fallback
      } else if (p.mode !== 'plain') {
        state.ghost = computeGhost(p, raw);
      }

      // scoped command → positional argument suggestions (stack above the caret + ghost).
      // suppressed while the recent overlay is up, so recall comes first; args only appear
      // once a recent entry is committed into the bar.
      state._argSug = null;
      if (p.mode === 'code' && !state.showRecent) {
        const sug = argSuggest(p.code, raw);
        if (sug) {
          const sig = sug.code + '|' + sug.completed.join(' ') + '|' + sug.options.join(',');
          if (sig !== state._argSig) { state.cmdSel = 0; state._argSig = sig; }   // new position → reset highlight
          state.cmdSel = Math.max(0, Math.min(sug.options.length - 1, state.cmdSel));
          state._argSug = sug;
          state.ghost = (sug.options[state.cmdSel] || '').slice(sug.partial.length);   // grey ghost of the pick
          state.ghostAction = '';
        } else { state._argSig = null; }
      }

      // slash code picker — the filtered list of codes shown in the overlay
      state._codeList = (p.mode === 'slash') ? codeMenuFiltered(p.query) : null;
      if (state._codeList) {
        if (state.selectedIndex >= state._codeList.length) state.selectedIndex = 0;
      }

      const selCount = state.showRecent ? state.recent.length
        : state._codeList ? state._codeList.length : state.results.length;
      if (state.selectedIndex >= selCount) state.selectedIndex = 0;
      if (state.selectedIndex < 0) state.selectedIndex = 0;

      renderBar(p, raw);
      renderBody(p);
      renderChips();
      renderSearchIcon(p);
      renderRecentOverlay();
      renderArgStack();       // caret-anchored after renderBar drew the caret
      renderCodeList();       // slash-code picker overlay

      // when the typed text changes, jump the list back to the top (recall self-scrolls)
      if (!state.showRecent && state._lastQ !== raw) {
        const r = document.getElementById('results'); if (r) r.scrollTop = 0;
      }
      state._lastQ = raw;
    }

    function setQuery(v) {
      state.query = v;
      state.cursorPos = v.length;
      state.selectedIndex = 0;
      state.showAllApps = false;
      state.showRecent = false;
      if (v === '') state.neutralSel = 0;       // back to neutral → reselect the first pinned app
      update();
    }
    function moveCursor(d) {
      state.cursorPos = Math.max(0, Math.min(state.query.length, state.cursorPos + d));
      update();
    }
    // shared up/down behaviour (used by hardware keys AND spacebar-swipe)
    function arrowUp() {
      if (state.showRecent) { moveSelection(-1); return; }
      if (state._argSug) { cycleArg(-1); return; }     // walk the argument stack
      if (state.query === '') { openRecent(); return; }
      moveSelection(-1);
    }
    function arrowDown() {
      if (state._argSug) { cycleArg(1); return; }
      moveSelection(1);
    }

    /* =====================================================================
       RENDER — bar token state (§3)
       ===================================================================== */
    function renderBar(p, raw) {
      const field = document.getElementById('field');
      field.innerHTML = '';

      if (raw === '') {
        field.appendChild(caret());              // white cursor sits before the "S"
        const ph = document.createElement('span'); ph.className = 'ph';
        ph.textContent = 'Search'; field.appendChild(ph);
        return;
      }

      if (p.mode === 'code') {
        const lead = raw.match(/^(\s*)(\S+)(.*)$/s);
        // styled code token
        const tok = document.createElement('span'); tok.className = 'tok';
        tok.style.color = state.tokenCode.accent; tok.style.opacity = '.7';
        tok.textContent = lead[1] + lead[2];
        field.appendChild(tok);
        const rest = document.createElement('span'); rest.textContent = lead[3];
        field.appendChild(rest);
        field.appendChild(caret());
        if (state.ghost) {                       // grey ghost of the highlighted arg option
          const g = document.createElement('span'); g.className = 'ghost'; g.textContent = state.ghost;
          field.appendChild(g);
        }
        return;
      }

      // plain text + caret at cursorPos + optional ghost (only when caret at end)
      const cp = Math.max(0, Math.min(raw.length, state.cursorPos));
      const before = document.createElement('span'); before.textContent = raw.slice(0, cp);
      field.appendChild(before);
      field.appendChild(caret());
      const after = document.createElement('span'); after.textContent = raw.slice(cp);
      field.appendChild(after);
      if (cp === raw.length && (state.ghost || state.ghostAction)) {
        const g = document.createElement('span'); g.className = 'ghost';
        g.textContent = state.ghost + (state.ghostAction ? '  —  ' + state.ghostAction : '');
        field.appendChild(g);
      }
    }
    function caret() { const c = document.createElement('span'); c.className = 'caret'; return c; }

    function renderSearchIcon(p) {
      const ic = document.getElementById('sicon');
      if (p.mode === 'code') {                 // scoped app/code icon
        ic.style.display = 'flex';
        ic.className = 'sicon app';
        ic.style.background = 'transparent'; ic.onclick = null;
        const img = ICONS[state.tokenCode.appId];
        if (img) { setIcon(ic, img, '/' + p.code, '#fff'); }
        else { ic.style.background = state.tokenCode.accent; ic.textContent = '/' + p.code; }
        return;
      }
      if (p.mode === 'empty') {                // slash-command launcher: tap the square to open the picker
        ic.style.display = 'flex';
        ic.className = 'sicon slash';
        ic.style.background = '';
        ic.innerHTML = ''; ic.textContent = '/';
        ic.onclick = () => setQuery('/');
        return;
      }
      // plain / peek / math: no leading icon (the "— action" hint is enough)
      ic.style.display = 'none';
      ic.innerHTML = ''; ic.onclick = null;
    }

    /* =====================================================================
       RENDER — body (pinned empty-state OR ranked results)
       ===================================================================== */
    function renderBody(p) {
      const pinned = document.getElementById('pinnedWrap');
      const results = document.getElementById('results');

      // ↑ recall — list mode takes over the whole surface; overlay mode floats above
      // the live results (so it falls through to render them normally underneath).
      if (state.showRecent && !state.recentOverlay) {
        pinned.style.display = 'none';
        results.style.display = 'flex';
        renderRecent(results);
        return;
      }

      if (p.mode === 'empty') {
        pinned.style.display = 'block';
        results.style.display = 'none';
        renderPinned();
        renderRecentPeek();
        return;
      }

      pinned.style.display = 'none';
      results.style.display = 'flex';
      results.innerHTML = '';

      // code mode keeps the simple TUI card list (icon + name + arg subtext),
      // then the web/files routes as a tile block underneath (same as plain strings)
      if (p.mode === 'code') {
        // list mode: the current position's options render as icon-less rows up top
        // (same role as the floating stack, just in the results list). cmdSel drives the highlight.
        if (state.argList && state._argSug) {
          const sug = state._argSug;
          const tl = document.createElement('div'); tl.className = 'list-title';
          tl.textContent = (sug.completed.length ? sug.code + ' ' + sug.completed.join(' ') : sug.code) + ' …';
          results.appendChild(tl);
          const og = document.createElement('div'); og.className = 'cardgroup';
          sug.options.forEach((opt, i) => {
            const row = document.createElement('div');
            row.className = 'row arg-listrow' + (i === state.cmdSel ? ' sel' : '');
            const body = document.createElement('div'); body.className = 'rbody';
            const t = document.createElement('div'); t.className = 'rtitle';
            if (sug.partial && opt.toLowerCase().startsWith(sug.partial.toLowerCase())) {
              const a = document.createElement('span'); a.className = 'arg-pre'; a.textContent = opt.slice(0, sug.partial.length);
              t.appendChild(a); t.appendChild(document.createTextNode(opt.slice(sug.partial.length)));
            } else { t.textContent = opt; }
            body.appendChild(t); row.appendChild(body);
            row.onclick = () => { state.cmdSel = i; acceptArg(); };
            og.appendChild(row);
          });
          results.appendChild(og);
        }
        const grp = document.createElement('div'); grp.className = 'cardgroup';
        const routes = [];
        state.results.forEach((r, i) => {
          if (r.type === 'web' || r.type === 'filesroute') { routes.push([r, i]); return; }
          grp.appendChild(mkRow(r, i, false));
        });
        results.appendChild(grp);
        if (routes.length) {
          const block = document.createElement('div'); block.className = 'searchblock';
          const q = document.createElement('div'); q.className = 'searchquery'; q.textContent = '"' + (p.query || '') + '"';
          block.appendChild(q);
          const row = document.createElement('div'); row.className = 'tilerow';
          routes.forEach(([r, i]) => row.appendChild(mkTile(r, i)));
          block.appendChild(row);
          results.appendChild(block);
        }
        return;
      }

      // ? peek → a full system panel: one grouped list of label · value rows
      if (p.mode === 'peek') {
        const tl = document.createElement('div'); tl.className = 'list-title'; tl.textContent = 'System';
        results.appendChild(tl);
        const grp = document.createElement('div'); grp.className = 'cardgroup';
        state.results.forEach((r, i) => grp.appendChild(mkRow(r, i, false)));
        results.appendChild(grp);
        return;
      }

      // grouped general search: answers → app tiles → cards → search routes
      const groups = { answers: [], apps: [], cards: [], routes: [] };
      state.results.forEach((r, i) => {
        if (r.type === 'answer') groups.answers.push([r, i]);
        else if (r.type === 'app') groups.apps.push([r, i]);
        else if (r.type === 'web' || r.type === 'filesroute') groups.routes.push([r, i]);
        else groups.cards.push([r, i]);
      });

      groups.answers.forEach(([r, i]) => results.appendChild(mkCard(r, i, true)));
      if (groups.answers.length && (groups.apps.length || groups.cards.length || groups.routes.length)) {
        const d = document.createElement('div'); d.className = 'answer-div'; results.appendChild(d);
      }

      // app matches → horizontally-swipeable row of tiles (swipe to discover more)
      if (groups.apps.length) {
        const row = document.createElement('div'); row.className = 'tilerow';
        groups.apps.forEach(([r, i]) => row.appendChild(mkTile(r, i)));
        results.appendChild(row);
      }

      // other results → grouped cards (icon + name) with hairline separators
      if (groups.cards.length) {
        const grp = document.createElement('div'); grp.className = 'cardgroup';
        groups.cards.forEach(([r, i]) => grp.appendChild(mkCard(r, i, false)));
        results.appendChild(grp);
      }

      // general-search routes → query text + Search/Files tiles, tap to enter
      if (groups.routes.length) {
        const block = document.createElement('div'); block.className = 'searchblock';
        const q = document.createElement('div'); q.className = 'searchquery'; q.textContent = '"' + (p.query || '') + '"';
        block.appendChild(q);
        const row = document.createElement('div'); row.className = 'tilerow';
        groups.routes.forEach(([r, i]) => row.appendChild(mkTile(r, i)));
        block.appendChild(row);
        results.appendChild(block);
      }
    }

    // fill an icon box with the app-icon image, or fall back to text
    function setIcon(box, imgPath, text, accent) {
      box.innerHTML = ''; box.style.color = accent || 'var(--txt-dim)';
      if (imgPath) {
        box.style.overflow = 'hidden'; box.style.background = 'transparent';
        const img = document.createElement('img'); img.src = imgPath; img.alt = '';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;';
        box.appendChild(img);
      } else { box.textContent = text; }
    }

    // simple list card — icon + name only (no subtext)
    function mkCard(r, i, isAnswer) {
      const row = document.createElement('div');
      row.className = 'row' + (isAnswer ? ' answer' : '') + (i === state.selectedIndex ? ' sel' : '');
      row.onclick = () => { state.selectedIndex = i; update(); r.action && r.action(); };
      const ic = document.createElement('div'); ic.className = 'ricon';
      setIcon(ic, r.iconImg, r.icon, r.accent);
      row.appendChild(ic);
      const body = document.createElement('div'); body.className = 'rbody';
      const t = document.createElement('div'); t.className = 'rtitle'; t.textContent = r.title;
      body.appendChild(t); row.appendChild(body);
      return row;
    }

    // tile — icon box + name (app match or search route), like pinned apps
    function mkTile(r, i) {
      const el = document.createElement('div');
      el.className = 'gtile' + (i === state.selectedIndex ? ' sel' : '');
      el.onclick = () => { state.selectedIndex = i; update(); r.action && r.action(); };
      const box = document.createElement('div'); box.className = 'gbox';
      setIcon(box, r.iconImg, r.icon, r.accent || '#fff');
      const lab = document.createElement('div'); lab.className = 'glabel'; lab.textContent = r.title;
      el.appendChild(box); el.appendChild(lab);
      if (r.code) { const c = document.createElement('div'); c.className = 'gcode'; c.textContent = r.code; el.appendChild(c); }
      return el;
    }

    function mkRow(r, i, isAnswer) {
      const row = document.createElement('div');
      row.className = 'row' + (isAnswer ? ' answer' : '') + (i === state.selectedIndex ? ' sel' : '');
      row.onclick = () => { state.selectedIndex = i; update(); r.action && r.action(); };

      if (r.type !== 'peek') {                  // peek rows are icon-less for a cleaner panel
        const ic = document.createElement('div'); ic.className = 'ricon';
        setIcon(ic, r.iconImg, r.icon, r.accent);
        row.appendChild(ic);
      }

      const body = document.createElement('div'); body.className = 'rbody';
      const t = document.createElement('div'); t.className = 'rtitle'; t.textContent = r.title;
      body.appendChild(t);
      if (r.sub) { const s = document.createElement('div'); s.className = 'rsub'; s.textContent = r.sub; body.appendChild(s); }
      row.appendChild(body);

      // dual-option trailing buttons (web / files)
      if (r.options) {
        const acts = document.createElement('div'); acts.className = 'ractions';
        r.options.forEach((o, oi) => {
          const btn = document.createElement('div');
          btn.className = 'opt' + (oi === 0 ? ' primary' : '');
          const dot = document.createElement('span');
          dot.style.cssText = 'width:6px;height:6px;border-radius:50%;flex:0 0 6px;background:' + o.accent;
          const ol = document.createElement('span'); ol.className = 'olabel'; ol.textContent = o.label;
          if (oi === 0) {
            const ek = document.createElement('span'); ek.className = 'olabel';
            ek.style.color = 'var(--txt-faint)'; ek.style.fontSize = '9px'; ek.textContent = '⏎';
            btn.appendChild(dot); btn.appendChild(ol); btn.appendChild(ek);
          } else { btn.appendChild(dot); btn.appendChild(ol); }
          btn.onclick = (e) => { e.stopPropagation(); state.selectedIndex = i; o.action(); };
          acts.appendChild(btn);
        });
        row.appendChild(acts);
      }
      return row;
    }

    function renderPinned() {
      const row = document.getElementById('pinnedRow');
      row.innerHTML = '';
      PINNED.forEach((pn, i) => {
        const el = document.createElement('div');
        el.className = 'pin' + (i === state.neutralSel ? ' sel' : '');
        el.onclick = () => { state.neutralSel = i; launchApp(pn.id, pn.label); };
        const tile = document.createElement('div'); tile.className = 'tile';
        setIcon(tile, ICONS[pn.id], pn.id.slice(0, 3), pn.accent);
        const lab = document.createElement('div'); lab.className = 'plabel'; lab.textContent = pn.label;
        el.appendChild(tile); el.appendChild(lab);
        const code = CODE_BY_APP[pn.id];
        if (code) { const c = document.createElement('div'); c.className = 'gcode'; c.textContent = '/' + code; el.appendChild(c); }
        row.appendChild(el);
      });
    }

    // neutral-state Recent searches — plain text of the raw query strings (same text the
    // recall overlay shows), in a grouped gray section. The empty state scrolls; tap re-runs.
    function renderRecentPeek() {
      const host = document.getElementById('recentPeek');
      if (!host) return;
      host.innerHTML = '';
      if (!state.recent.length) return;
      const tl = document.createElement('div'); tl.className = 'list-title'; tl.textContent = 'Recent searches';
      host.appendChild(tl);
      const grp = document.createElement('div'); grp.className = 'cardgroup';
      let selRow = null;
      state.recent.forEach((q, j) => {
        const idx = PINNED.length + j;                 // selection index (after the pinned apps)
        const row = document.createElement('div'); row.className = 'row' + (idx === state.neutralSel ? ' sel' : '');
        const t = document.createElement('div'); t.className = 'rtitle'; t.textContent = q;
        row.appendChild(t);
        row.onclick = () => { state.neutralSel = idx; setQuery(q); };   // tap re-runs the query
        grp.appendChild(row);
        if (idx === state.neutralSel) selRow = row;
      });
      host.appendChild(grp);
      if (selRow) requestAnimationFrame(() => selRow.scrollIntoView({ block: 'nearest' }));
    }

    // ↑ recall — recent searches, reversed: most recent at the bottom (by the bar),
    // older ones above; ↑ walks upward into older. No title, bottom-anchored, scrolls.
    function renderRecent(container) {
      container.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'margin-top:auto;padding-bottom:8px;';   // stick to bottom + gap above bar
      const grp = document.createElement('div'); grp.className = 'cardgroup';
      for (let i = state.recent.length - 1; i >= 0; i--) {     // oldest → top, newest → bottom
        const q = state.recent[i];
        const row = document.createElement('div');
        row.className = 'row recent' + (i === state.selectedIndex ? ' sel' : '');
        row.onclick = () => { state.showRecent = false; setQuery(q); };
        const body = document.createElement('div'); body.className = 'rbody';
        const t = document.createElement('div'); t.className = 'rtitle'; t.textContent = q;
        body.appendChild(t); row.appendChild(body);
        grp.appendChild(row);
      }
      wrap.appendChild(grp);
      container.appendChild(wrap);
      // start scrolled to the bottom-most (newest) element
      container.scrollTop = container.scrollHeight;
      requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
    }

    // floating recent-search overlay — oldest at top, newest (selected) by the bar.
    // ~3.5 rows visible; scroll by swipe/arrows/spacebar. Selected always scrolled into view.
    function renderRecentOverlay() {
      const ov = document.getElementById('recentOverlay');
      const list = document.getElementById('recentList');
      if (!ov || !list) return;
      if (!state.showRecent || !state.recentOverlay || !state.recent.length) {
        ov.className = 'recent-ov hidden'; list.innerHTML = ''; return;
      }
      ov.className = 'recent-ov';
      list.innerHTML = '';
      let selEl = null;
      for (let i = state.recent.length - 1; i >= 0; i--) {   // oldest → top, newest → bottom
        const q = state.recent[i];
        const row = document.createElement('div');
        row.className = 'rov-row' + (i === state.selectedIndex ? ' sel' : '');
        row.textContent = q;
        row.onclick = () => setQuery(q);     // tap to land it (cursor jumps to end, overlay hides)
        list.appendChild(row);
        if (i === state.selectedIndex) selEl = row;
      }
      if (selEl) requestAnimationFrame(() => selEl.scrollIntoView({ block: 'nearest' }));
    }

    // Minecraft-style argument stack — a small column of the current position's options,
    // anchored above the caret (the start of the arg being typed). Highlighted = cmdSel.
    function renderArgStack() {
      const stk = document.getElementById('argStack');
      if (!stk) return;
      const sug = state._argSug;
      if (!sug || state.argList) { stk.className = 'arg-stack hidden'; stk.innerHTML = ''; return; }   // list mode renders in the results instead
      stk.className = 'arg-stack';
      stk.innerHTML = '';
      sug.options.forEach((opt, i) => {
        const row = document.createElement('div');
        row.className = 'arg-row' + (i === state.cmdSel ? ' sel' : '');
        // show the matched prefix dim + the completion bright, so it reads like the ghost
        if (sug.partial && opt.toLowerCase().startsWith(sug.partial.toLowerCase())) {
          const a = document.createElement('span'); a.className = 'arg-pre'; a.textContent = opt.slice(0, sug.partial.length);
          const b = document.createElement('span'); b.textContent = opt.slice(sug.partial.length);
          row.appendChild(a); row.appendChild(b);
        } else { row.textContent = opt; }
        row.onclick = () => { state.cmdSel = i; acceptArg(); };
        stk.appendChild(row);
      });
      // anchor synchronously to the START of the current argument token (not the caret) so the
      // stack stays put while you type within an arg — only stepping when a new arg begins.
      // getBoundingClientRect forces layout, so no rAF needed (and rAF can be throttled off-screen).
      const field = document.getElementById('field');
      const caretEl = field && field.querySelector('.caret');
      const stackBox = document.querySelector('.stack');
      const bar = document.getElementById('bar');
      if (!caretEl || !stackBox || !bar) return;
      const cr = caretEl.getBoundingClientRect();
      const sr = stackBox.getBoundingClientRect();
      const br = bar.getBoundingClientRect();
      const cs = getComputedStyle(field);
      const partW = sug.partial ? measureText(sug.partial, cs.fontSize + ' ' + cs.fontFamily) : 0;
      let left = Math.round((cr.left - partW - sr.left) - 17);   // -17 ≈ stack pad (5) + row pad (12) → text lines up with token start
      left = Math.max(8, Math.min(left, sr.width - stk.offsetWidth - 8));
      stk.style.left = left + 'px';
      stk.style.bottom = Math.round(sr.bottom - br.top + 8) + 'px';   // 8px gap above the bar
    }

    // cached canvas text measurement (for token-start anchoring)
    function measureText(str, font) {
      const ctx = measureText._c || (measureText._c = document.createElement('canvas').getContext('2d'));
      ctx.font = font;
      return ctx.measureText(str).width;
    }

    // accept the highlighted option: complete the partial token + a trailing space so the
    // NEXT position's options appear immediately.
    function acceptArg() {
      const sug = state._argSug; if (!sug) return;
      const opt = sug.options[state.cmdSel] || sug.options[0];
      let q = '/' + sug.code;
      if (sug.completed.length) q += ' ' + sug.completed.join(' ');
      q += ' ' + opt + ' ';
      state.query = q; state.cursorPos = q.length;
      state.selectedIndex = 0; state.showRecent = false;
      update();
    }

    // cycle the highlighted option within the current stack
    function cycleArg(d) {
      const n = state._argSug ? state._argSug.options.length : 0; if (!n) return;
      state.cmdSel = (state.cmdSel + d + n) % n;
      update();
    }

    // slash-code picker: filter the code menu by the letters typed after "/"
    function codeMenuFiltered(q) {
      q = (q || '').toLowerCase();
      if (!q) return CODE_MENU;
      return CODE_MENU.filter(c => c.code.startsWith(q) || c.app.toLowerCase().startsWith(q));
    }

    // slash-code picker overlay — a 270px-wide window of colour-coded code cards above the
    // bar, filtered live. Tap a card (or Enter) to drop into that code.
    function renderCodeList() {
      const ov = document.getElementById('codeList');
      if (!ov) return;
      const list = state._codeList;
      if (!list) { ov.className = 'code-ov hidden'; ov.innerHTML = ''; return; }
      ov.className = 'code-ov';
      ov.innerHTML = '';
      let selEl = null;
      list.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'code-card' + (i === state.selectedIndex ? ' sel' : '');
        const tok = document.createElement('span'); tok.className = 'code-token';
        tok.textContent = '/' + c.code; tok.style.color = c.accent;
        const name = document.createElement('span'); name.className = 'code-appname'; name.textContent = c.app;
        card.appendChild(tok); card.appendChild(name);
        card.onclick = () => selectCode(c);
        ov.appendChild(card);
        if (i === state.selectedIndex) selEl = card;
      });
      if (selEl) requestAnimationFrame(() => selEl.scrollIntoView({ block: 'nearest' }));
    }

    // enter the chosen code — scoped command mode (trailing space starts the arg menu), or
    // the system panel for /?
    function selectCode(c) {
      setQuery(c.code === '?' ? '/?' : '/' + c.code + ' ');
    }

    function renderChips() {
      const wrap = document.getElementById('chips');
      if (!state.showChips || !state.chips.length) { wrap.className = 'chips hidden'; return; }
      wrap.className = 'chips';
      wrap.innerHTML = '';
      state.chips.forEach(c => {
        const el = document.createElement('div'); el.className = 'chip'; el.textContent = c.label;
        el.onclick = () => c.apply();
        wrap.appendChild(el);
      });
    }

    /* =====================================================================
       KEY HANDLING  (§2) — source-agnostic
       ===================================================================== */
    function moveSelection(d) {
      if (state._codeList) {                   // slash code picker
        const n = state._codeList.length; if (!n) return;
        state.selectedIndex = (state.selectedIndex + d + n) % n;
        update(); return;
      }
      if (state.showRecent) {                  // recall list is reversed: ↑ = older (+1)
        const n = state.recent.length; if (!n) return;
        state.selectedIndex = Math.max(0, Math.min(n - 1, state.selectedIndex - d));
        state.query = state.recent[state.selectedIndex];   // type selected entry into the bar
        state.cursorPos = state.query.length;              // caret sits after the last letter
        update(); return;
      }
      if (parseInput(state.query).mode === 'empty') return;
      const n = state.results.length; if (!n) return;
      state.selectedIndex = (state.selectedIndex + d + n) % n;
      update();
    }

    // neutral-state Tab navigation — cycle the selection over pinned apps then recent rows
    function cycleNeutral(d) {
      const total = PINNED.length + state.recent.length;
      if (!total) return;
      state.neutralSel = (state.neutralSel + d + total) % total;
      update();
    }

    function doEnter() {
      if (state.showRecent) {                  // send the recent search now sitting in the bar
        state.showRecent = false; state.selectedIndex = 0; update();
      }
      const p = parseInput(state.query);
      if (p.mode === 'slash') {                   // pick the highlighted code from the picker
        const c = (state._codeList || [])[state.selectedIndex] || (state._codeList || [])[0];
        if (c) selectCode(c);
        return;
      }
      if (p.mode === 'empty') {                   // launch the selected pinned app, or re-run a recent
        const sel = state.neutralSel || 0;
        if (sel < PINNED.length) { const pn = PINNED[sel]; launchApp(pn.id, pn.label); }
        else { setQuery(state.recent[sel - PINNED.length] || ''); }
        return;
      }
      recordSearch(state.query);              // remember it (terminal-style history)
      const r = state.results[state.selectedIndex];
      r && r.action && r.action();
    }

    // Tab: accept ghost/autosuggest first; otherwise navigate selection forward
    function doTab(shift) {
      if (state.showRecent) { moveSelection(shift ? -1 : 1); return; }
      if (parseInput(state.query).mode === 'empty') { cycleNeutral(shift ? -1 : 1); return; }   // pinned + recent
      if (state._argSug) { acceptArg(); return; }   // Tab accepts the highlighted argument
      if (state.ghost) {                        // complete code OR history autosuggest
        const p = parseInput(state.query);
        const sep = p.mode === 'plain' && CODES[(state.query.trim() + state.ghost)] ? ' ' : '';
        setQuery(state.query + state.ghost + sep);
        return;
      }
      moveSelection(shift ? -1 : 1);              // tab navigation through results
    }

    function openRecent() {
      if (!state.recent.length) { toast('No recent searches'); return; }
      state.showRecent = true; state.selectedIndex = 0;
      state.query = state.recent[0];           // newest entry drops into the bar
      state.cursorPos = state.query.length;    // caret after the last letter
      update();
    }
    function closeRecent() { if (state.showRecent) { state.showRecent = false; update(); } }

    function recordSearch(q) {
      q = (q || '').trim(); if (!q) return;
      state.recent = state.recent.filter(x => x !== q);   // dedupe
      state.recent.unshift(q);
      if (state.recent.length > 20) state.recent.pop();
    }

    function typeChar(ch) {
      const q = state.query, cp = Math.max(0, Math.min(q.length, state.cursorPos));
      state.query = q.slice(0, cp) + ch + q.slice(cp); state.cursorPos = cp + 1;
      state.selectedIndex = 0; state.showAllApps = false; state.showRecent = false; update();
    }
    function backspace() {
      if (state.showRecent) { closeRecent(); return; }   // first backspace just dismisses the overlay
      const q = state.query, cp = Math.max(0, Math.min(q.length, state.cursorPos));
      if (cp > 0) { state.query = q.slice(0, cp - 1) + q.slice(cp); state.cursorPos = cp - 1; }
      state.selectedIndex = 0; state.showAllApps = false; update();
    }

    // hardware / external keyboard — same path
    document.addEventListener('keydown', e => {
      if (document.getElementById('appscreen').classList.contains('show')) {
        if (e.key === 'Escape' || e.key === 'Backspace') { closeApp(); e.preventDefault(); }
        return;
      }
      if (e.key === 'Enter') { doEnter(); e.preventDefault(); }
      else if (e.key === 'ArrowDown') { arrowDown(); e.preventDefault(); }
      else if (e.key === 'ArrowUp') { arrowUp(); e.preventDefault(); }
      else if (e.key === 'ArrowLeft') { moveCursor(-1); e.preventDefault(); }
      else if (e.key === 'Tab') { doTab(e.shiftKey); e.preventDefault(); }
      else if (e.key === 'ArrowRight') {
        if (state._argSug && state.cursorPos === state.query.length) { acceptArg(); }   // → accepts the arg
        else if (state.ghost && state.cursorPos === state.query.length) { setQuery(state.query + state.ghost); }
        else moveCursor(1);
        e.preventDefault();
      }
      else if (e.key === 'Escape') { if (state._codeList) setQuery(''); else closeRecent(); e.preventDefault(); }
      else if (e.key === 'Backspace') { backspace(); e.preventDefault(); }
      else if (e.key.length === 1 && !e.metaKey && !e.ctrlKey) { typeChar(e.key); e.preventDefault(); }
    });

    /* =====================================================================
       ACTIONS / SIDE-EFFECTS (stubbed with toasts + screens)
       ===================================================================== */
    function launchApp(id, label) {
      if (id === 'terminal') { openTerminal(''); return; }
      toast('Launching ' + label);
    }

    function runCode(code, query) {
      const c = CODES[code];
      if (code === 't') {
        toast('Terminal: ran `' + query + '`');
        setTimeout(() => openTerminal(query), 250);
        return;
      }
      // set/snd/mod mutate inline
      toast(c.app + ': ' + (query || '(opened)'));
    }

    function openTerminal(cmd) {
      const scr = document.getElementById('appscreen');
      document.getElementById('atitle').textContent = 'Terminal';
      const body = document.getElementById('abody');
      body.innerHTML = '';
      const t = document.createElement('div'); t.className = 'term';
      let html = '<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ </div>';
      if (cmd) {
        html = '<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ ' + escapeHtml(cmd) + '</div>';
        html += fakeOutput(cmd);
        html += '<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~/downloads</span>$ <span class="caret"></span></div>';
      } else {
        html += '<div><span class="pmpt">mecha@comet</span>:<span style="color:#7aa2ff">~</span>$ <span class="caret"></span></div>';
      }
      t.innerHTML = html;
      body.appendChild(t);
      scr.classList.add('show');
    }
    function fakeOutput(cmd) {
      if (/^cd\s/.test(cmd)) return '<div class="out">→ ' + escapeHtml(cmd.replace(/^cd\s+/, '')) + '</div>';
      if (/^ls/.test(cmd)) return '<div class="out">cable.png  setup.sh  notes.md  build/</div>';
      if (/^pwd/.test(cmd)) return '<div class="out">/home/mecha/downloads</div>';
      return '<div class="out">' + escapeHtml(cmd) + ': done</div>';
    }
    function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    function openFiles(query) {
      const scr = document.getElementById('appscreen');
      document.getElementById('atitle').textContent = 'Files';
      const body = document.getElementById('abody');
      const hits = ['cable.png', 'setup.sh', 'notes.md', 'build/', 'holster.stl', 'readme.txt']
        .filter(f => !query || f.toLowerCase().includes(query.toLowerCase().slice(0, 3)) || true);
      body.innerHTML = '<div class="term"><div class="out">~/ matching “' + escapeHtml(query) + '”</div></div>';
      const list = document.createElement('div'); list.className = 'term';
      hits.forEach(f => {
        const d = document.createElement('div');
        d.innerHTML = '<span style="color:#5ec8a0">▸</span> ' + escapeHtml(f);
        list.appendChild(d);
      });
      body.appendChild(list);
      scr.classList.add('show');
    }

    function closeApp() { document.getElementById('appscreen').classList.remove('show'); }
    document.getElementById('aback').onclick = closeApp;
